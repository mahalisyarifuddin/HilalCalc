<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MABBIMS Hijri Calendar</title>
	<style>
		:root {
			--primary: #005dac;
			--on-primary: #ffffff;
			--hover: #00539a;
			--background: #f9f9ff;
			--surface: #ffffff;
			--text: #181c21;
			--border: #c1c6d4;
			--muted: #f2f3fc;
			--success: #0b6b1d;
			--on-success: #ffffff;
			--danger: #ba1a1a;
			--on-danger: #ffffff;
			--highlight-bg: #d4e3ff;
			--formula-bg: #f8f9fa;
			--accent: #f57c00;
			--accent-bg: #fffdf0;
		}
		@media (prefers-color-scheme: dark) {
			:root:not(.light) {
				--primary: #a5c8ff;
				--on-primary: #00315f;
				--hover: #72adff;
				--background: #101319;
				--surface: #0b0e14;
				--text: #e0e2ea;
				--border: #414752;
				--muted: #181c21;
				--success: #82db7e;
				--on-success: #00390a;
				--danger: #ffb4ab;
				--on-danger: #93000a;
				--highlight-bg: #001c3a;
				--formula-bg: #1e222b;
				--accent: #ffb74d;
				--accent-bg: #2a2200;
			}
		}
		:root.dark {
			--primary: #a5c8ff;
			--on-primary: #00315f;
			--hover: #72adff;
			--background: #101319;
			--surface: #0b0e14;
			--text: #e0e2ea;
			--border: #414752;
			--muted: #181c21;
			--success: #82db7e;
			--on-success: #00390a;
			--danger: #ffb4ab;
			--on-danger: #93000a;
			--highlight-bg: #001c3a;
			--formula-bg: #1e222b;
			--accent: #ffb74d;
			--accent-bg: #2a2200;
		}
		* { 
			box-sizing: border-box; 
			margin: 0; 
			padding: 0; 
			outline-offset: 2px; 
		}
		*:focus-visible { 
			outline: 2px solid var(--primary); 
		}
		body {
			font-family: sans-serif;
			background-color: var(--background);
			color: var(--text);
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 20px;
		}
		.container {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 8px;
			max-width: 960px;
			width: 100%;
			padding: 20px;
			position: relative;
		}
		h1 {
			font-size: 1.25rem;
			margin: 0 0 4px;
		}
		h2, h3, label {
			margin: 0.25rem 0;
		}
		label { 
			display: block; 
			font-weight: 700; 
			margin-bottom: 0.15rem;
			font-size: 0.85rem;
		}
		input, select, button {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 4px;
			color: var(--text);
			font-size: 0.95rem;
			padding: 0.4rem;
			width: 100%;
		}
		button { 
			cursor: pointer; 
			font-weight: 500; 
			transition: background 0.2s; 
		}
		button:hover { 
			opacity: 0.9; 
		}
		button:disabled { 
			opacity: 0.6; 
			cursor: not-allowed; 
		}
		.primary { 
			background: var(--primary); 
			color: var(--on-primary); 
			border: 0; 
		}
		.primary:hover:not(:disabled) { 
			background: var(--hover); 
		}
		.secondary { 
			background: transparent; 
			border: 1px solid var(--border); 
			color: var(--text); 
		}
		.secondary:hover:not(:disabled) { 
			background: var(--muted); 
		}
		.selectors {
			position: absolute;
			right: 20px;
			top: 20px;
			display: flex;
			gap: 6px;
		}
		.calendar-grid {
			display: grid;
			grid-template-columns: repeat(7, minmax(40px, 1fr));
			gap: 0;
			overflow-x: auto;
			min-width: 100%;
		}
		.day-header {
			padding: 6px;
			text-align: center;
			font-weight: 700;
			font-size: 0.8rem;
			color: var(--text);
			opacity: 0.6;
		}
		.day-header.friday-header {
			color: var(--accent);
			opacity: 1;
		}
		.day-cell {
			min-height: 34px;
			padding: 1px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			position: relative;
			border-radius: 6px;
			transition: background 0.2s;
		}
		.day-cell.friday-cell {
			background: var(--accent-bg);
		}
		.day-cell.other-month {
			opacity: 0.25;
		}
		.day-cell.selected { 
			background: var(--highlight-bg);
		}
		.day-cell.today {
			box-shadow: inset 0 0 0 2px var(--primary);
		}
		.day-cell.today .primary-date {
			color: var(--primary);
			font-weight: 700;
		}
		.day-cell:hover { 
			background: var(--muted); 
			cursor: pointer; 
		}
		.day-cell:focus-visible {
			outline: 2px solid var(--primary); 
			z-index: 10; 
		}
		.primary-date {
			font-size: 1rem;
			font-weight: 700; 
			margin-bottom: 0;
		}
		.secondary-date {
			font-size: 0.7rem;
			opacity: 0.6;
			text-align: center;
		}
		.secondary-month-start {
			color: var(--success);
			font-weight: 700;
			opacity: 1;
		}
		.month-short { display: none; }
		.julian-label {
			display: inline-block;
			font-size: 0.55rem;
			margin-left: 2px;
			vertical-align: middle;
		}
		.calendar-card {
			background: var(--surface);
			color: var(--text);
			border-radius: 8px;
			padding: 0;
			margin-bottom: 4px;
		}
		.calendar-card-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 0.25rem;
			gap: 1rem;
		}
		.calendar-card h2 {
			font-size: 1.15rem;
			margin: 0;
			font-weight: 700;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.calendar-card-subtitle {
			font-size: 0.75rem;
			opacity: 0.7;
			text-align: center;
			height: 1.2rem;
			display: flex;
			align-items: center;
			justify-content: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.nav-btn {
			background: var(--surface);
			border: 1px solid var(--border);
			color: var(--text);
			padding: 4px 12px;
			border-radius: 4px;
			font-size: 0.85rem;
			width: auto;
			min-width: 80px;
		}
		.nav-btn:hover {
			background: var(--muted);
		}
		.today-btn {
			background: var(--surface);
			border: 1px solid var(--border);
			color: var(--text);
			padding: 4px 12px;
			border-radius: 4px;
			font-size: 0.8rem;
			font-weight: 600;
			width: auto;
			margin: 0.25rem auto 0;
			display: block;
		}
		.today-btn:hover {
			background: var(--muted);
		}
		.controls { 
			display: flex; 
			justify-content: center;
			margin-bottom: 0.5rem;
		}
		.control-group {
			width: 100%;
			max-width: 600px;
			background: var(--formula-bg);
			padding: 0.5rem 0.75rem;
			border-radius: 8px;
			border: 1px solid var(--border);
			font-size: 0.9rem;
		}
		.row { 
			display: flex; 
			gap: 0.5rem; 
			margin-bottom: 0.25rem;
		}
		.row > * { 
			flex: 1; 
		}
		dialog {
			background: var(--surface);
			color: var(--text);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 1.25rem;
			max-width: 400px;
			width: 100%;
			margin: auto;
			position: fixed;
		}
		dialog::backdrop { 
			background: rgba(0, 0, 0, 0.5); 
		}
		.dialog-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 1rem;
		}
		.dialog-header h3 { 
			font-size: 1.15rem;
			font-weight: 600; 
			margin: 0; 
		}
		.close-button {
			background: transparent;
			color: var(--text);
			padding: .25rem;
			font-size: 1.25rem;
			line-height: 1;
			border: none;
			width: auto;
		}
		.close-button:hover { 
			background: var(--background); 
			color: var(--text); 
		}
		.group {
			background: var(--background);
			border: 1px solid var(--border);
			padding: 0.75rem;
			border-radius: 6px;
			margin-bottom: 0.75rem;
			position: relative;
		}
		dialog input:not([type=color]):not([type=range]), dialog textarea, dialog select, dialog button {
			width: 100%;
			padding: .4rem .6rem;
			border: 1px solid var(--border);
			border-radius: 4px;
			background: var(--surface);
			color: var(--text);
			margin-top: 4px;
			font-family: inherit;
			font-size: .9rem;
		}
		dialog button { 
			background: var(--primary); 
			color: var(--on-primary); 
			border: 0; 
			cursor: pointer; 
		}
		dialog button:hover { 
			background: var(--hover); 
		}
		.info-text { 
			font-size: 0.8rem;
			opacity: 0.7; 
			margin-top: 0.75rem;
			text-align: center; 
		}
		@media(max-width: 600px) {
			.selectors { 
				position: static; 
				justify-content: flex-end;
				margin-bottom: 0.5rem;
			}
			.day-cell { 
				min-height: 50px;
				padding: 2px;
			}
			.primary-date {
				font-size: 1rem;
			}
			.secondary-date {
				font-size: 0.7rem;
			}
			.month-full { display: none; }
			.month-short { display: inline; }
		}
		.spinner {
			display: inline-block;
			width: 1em;
			height: 1em;
			border: 2px solid currentColor;
			border-right-color: transparent;
			border-radius: 50%;
			animation: spin 0.75s linear infinite;
			vertical-align: text-bottom;
			margin-right: 4px;
		}
		@keyframes spin { 
			100% { 
				transform: rotate(360deg); 
			} 
		}
		.input-group {
			display: flex;
			gap: 0.4rem;
			margin-bottom: 0.75rem;
			align-items: center;
		}
		.input-group > * {
			flex: 1;
		}
		.sr-only {
			position: absolute;
			width: 1px;
			height: 1px;
			padding: 0;
			margin: -1px;
			overflow: hidden;
			clip: rect(0,0,0,0);
			border: 0;
		}
		#hDayInput {
			flex: 0.6;
		}
		#hMonthInput {
			flex: 2;
		}
		#hYearInput {
			flex: 1;
		}
		details {
			margin-top: 8px;
			border-top: 1px solid var(--border);
			padding-top: 8px;
		}
		summary {
			cursor: pointer;
			opacity: 0.8;
			font-size: 0.85rem;
			margin-bottom: 0.25rem;
		}
		summary:hover {
			opacity: 1;
			color: var(--primary);
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="selectors">
			<button id="prefBtn" class="secondary" style="width:auto; padding: 4px 8px; font-size: 0.85rem;" data-i18n="prefTitle"></button>
		</div>
		<h1 id="appTitle" data-i18n="appTitle"></h1>
		<p id="appSubtitle" style="opacity: 0.7; margin: 0 0 8px; font-size: 0.85rem;"></p>
		<div class="controls" style="margin-bottom: 8px;">
			<div class="control-group">
				<label class="sr-only" data-i18n="gDateLabel"></label>
				<div class="input-group">
					<input type="date" id="gDateInput" data-i18n-aria="gDateLabel">
				</div>
				<div class="input-group" style="margin-bottom:0">
					<input type="number" id="hDayInput" placeholder="D" min="1" max="30" data-i18n-aria="hDayLabel">
					<select id="hMonthInput" data-i18n-aria="hMonthLabel"></select>
					<input type="number" id="hYearInput" placeholder="Year" min="1300" max="2500" data-i18n-aria="hYearLabel" data-i18n-placeholder="yearPlaceholder">
				</div>
			</div>
		</div>
		<div class="calendar-card">
			<div class="calendar-card-header">
				<button id="prevMonthBtn" class="nav-btn" data-i18n="prevBtn"></button>
				<h2 id="monthDisplay"></h2>
				<button id="nextMonthBtn" class="nav-btn" data-i18n="nextBtn"></button>
			</div>
			<div id="hijriRangeDisplay" class="calendar-card-subtitle"></div>
			<button id="todayBtn" class="today-btn" data-i18n="today"></button>
		</div>
		<div class="calendar-grid" id="calendar"></div>
		<details>
			<summary><span data-i18n="formulaTitle"></span></summary>
			<p id="formulaDisplay" style="font-family: monospace; font-size: 0.85rem; background: var(--surface); padding: 4px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 4px;"></p>
			<p id="formulaDesc" style="font-size: 0.75rem; opacity: 0.8;" data-i18n="formulaDesc"></p>
			<p id="formulaNote" style="font-size: 0.75rem; opacity: 0.8; margin-top:4px;"></p>
			<p class="info-text" id="footerNote" data-i18n="footer"></p>
		</details>
	</div>
	<dialog id="prefDialog">
		<div class="dialog-header">
			<h3 id="prefTitle" data-i18n="prefTitle"></h3>
			<button id="closePref" class="close-button" aria-label="Close Settings" data-i18n-aria="closeLabel">&times;</button>
		</div>
		<div class="group">
			<label>
				<span id="langLabel" data-i18n="langLabel"></span>
				<select id="language"><option value="en">English</option><option value="id">Bahasa Indonesia</option></select>
			</label>
			<label>
				<span id="themeLabel" data-i18n="themeLabel"></span>
				<select id="theme"><option value="auto">Auto</option><option value="light">Light</option><option value="dark">Dark</option></select>
			</label>
			<label>
				<span id="primaryCalLabel" data-i18n="primaryCalLabel"></span>
				<select id="primaryCalendar"><option value="gregorian">Gregorian</option><option value="hijri">Hijri</option></select>
			</label>
			<label>
				<span id="gModeLabel" data-i18n="gModeLabel"></span>
				<select id="gModeSelect"><option value="transition" data-i18n="gModeTransition">Transition (1582)</option><option value="proleptic" data-i18n="gModeProleptic">Proleptic (Pure)</option></select>
			</label>
			<label>
				<span id="calcModeLabel" data-i18n="calcModeLabel">Calculation Method</span>
				<select id="calcMode">
					<option value="astronomic" data-i18n="calcModeAstronomic">Local Sighting (MABBIMS)</option>
					<option value="linear" data-i18n="calcModeLinear">Global Formula (Linear)</option>
					<option value="tabular" data-i18n="calcModeTabular">Global Tabular (Fixed Cycle)</option>
				</select>
			</label>
			<label>
				<span id="weekStartLabel" data-i18n="weekStartLabel"></span>
				<select id="weekStart"><option value="0">Sunday</option><option value="1">Monday</option><option value="6">Saturday</option></select>
			</label>
		</div>
		<div class="group">
			<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.5rem">
				<label id="locLabel" style="margin-bottom:0" data-i18n="locLabel"></label>
				<button id="myLocBtn" style="width:auto; padding: .25rem .5rem; font-size:.8rem; background:transparent; color:var(--primary); border:none;" data-i18n="myLoc"></button>
			</div>
			<div class="row">
				<div style="flex:1"><label style="font-weight:normal; font-size:0.8em" data-i18n="latLabel"></label><input type="number" id="latInput" step="0.0001"></div>
				<div style="flex:1"><label style="font-weight:normal; font-size:0.8em" data-i18n="lonLabel"></label><input type="number" id="lonInput" step="0.0001"></div>
			</div>
		</div>
		<div class="group">
			<label id="adjLabel" data-i18n="adjLabel"></label>
			<input type="number" id="hijriAdj" value="0" min="-2" max="2">
			<small style="opacity: 0.6;" data-i18n="adjNote"></small>
		</div>
		<div style="display: flex; gap: 10px; margin-top: 1rem;">
			<button id="resetPrefBtn" class="secondary" data-i18n="reset"></button>
			<button id="savePrefBtn" class="primary" data-i18n="save"></button>
		</div>
	</dialog>
	<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

				footer: '* Tanggal dimulai saat maghrib. Kriteria MABBIMS: Alt ≥ 3°, Elong ≥ 6.4°.',
				gDateLabel: 'Tanggal Masehi',
				hDayLabel: 'Hari Hijriyah',
				hMonthLabel: 'Bulan Hijriyah',
				hYearLabel: 'Tahun Hijriyah',
				goBtnLabel: 'Buka Tanggal Masehi',
				prevMonthLabel: 'Bulan Sebelumnya',
				nextMonthLabel: 'Bulan Berikutnya',
				prevBtn: '← Sblm',
				nextBtn: 'Lanjut →',
				yearPlaceholder: 'Tahun',
				offlineWarning: 'Mode Offline: Menggunakan Aproksimasi Linear',
				geoNotSupported: 'Geolokasi tidak didukung oleh browser ini.',
				errorLocation: 'Gagal mendapatkan lokasi: ',
				offlineSuffix: ' (Offline/Linear)',
				latLabel: 'Lintang',
				lonLabel: 'Bujur',
				adjNote: 'Menggeser rumus Linear.',
				themeAuto: 'Otomatis',
				themeLight: 'Terang',
				themeDark: 'Gelap',
				calGregorian: 'Masehi',
				calHijri: 'Hijriyah',
				weekSun: 'Minggu',
				weekMon: 'Senin',
				weekSat: 'Sabtu',
				dirN: 'LU',
				dirS: 'LS',
				dirE: 'BT',
				dirW: 'BB',
				calcModeLabel: 'Perhitungan Hijriyah',
				calcModeAstronomic: 'Rukyat Lokal (MABBIMS)',
				calcModeLinear: 'Rumus Global (Linear)',
				calcModeTabular: 'Tabular Global (Siklus Tetap)',
				linearSuffix: ' (Linear)',
				tabularSuffix: ' (Tabular)',
				gModeLabel: 'Kalender Masehi',
				gModeTransition: 'Sejarah (Transisi 1582)',
				gModeProleptic: 'Berkelanjutan (Modern)',
				julian: 'Julian'
			}
		};

		const elements = new Proxy({},{get:(_,id)=>document.getElementById(id) });

		let state = {
			lat: 6.075,
			lon: 95.1125,
			lang: navigator.language?.startsWith('id') ? 'id' : 'en',
			theme: 'auto',
			weekStart: 0,
			hijriAdj: 0,
			primaryCalendar: 'gregorian',
			calcMode: 'astronomic',
			gMode: 'transition'
		};

		class HijriCalc {
			constructor() {
				this.isOffline = (typeof Astronomy === 'undefined');
				this.cacheVersion = 6;
				this.loadState();
				state.viewDate = new Date();
				this.setup();
				this.updateLanguage(state.lang);
				this.applyTheme(state.theme);
				this.render();

				if (this.isOffline) {
					console.warn("Astronomy Engine not loaded. Using Linear method.");
					const warning = document.createElement('div');
					warning.style.cssText = 'color:var(--danger);text-align:center;font-weight:400;margin-bottom:1rem';
					warning.setAttribute('data-i18n', 'offlineWarning');
					warning.textContent = text[state.lang].offlineWarning;

					const container = document.querySelector('.container');
					if (container) {
						container.insertBefore(warning, container.firstChild);
					}
				}
			}

			loadState() {
				try {
					const saved = localStorage.getItem('hijriCalcState');
					if (saved) {
						const parsed = JSON.parse(saved);
						if (parsed.lat !== undefined) state.lat = parsed.lat;
						if (parsed.lon !== undefined) state.lon = parsed.lon;
						if (parsed.lang) state.lang = parsed.lang;
						if (parsed.theme) state.theme = parsed.theme;
						if (parsed.weekStart !== undefined) state.weekStart = parsed.weekStart;
						if (parsed.hijriAdj !== undefined) state.hijriAdj = parsed.hijriAdj;
						if (parsed.primaryCalendar) state.primaryCalendar = parsed.primaryCalendar;
						if (parsed.calcMode) state.calcMode = parsed.calcMode;
						if (parsed.gMode) state.gMode = parsed.gMode;
					}
				} catch (e) { console.error("Failed to load state", e); }
			}

			loadCache() {
				try {
					const saved = localStorage.getItem('hijriCalcCache');
					if (saved) {
						const parsed = JSON.parse(saved);
						if (parsed.version === this.cacheVersion) this.cache = parsed.data;
						else this.cache = {};
					} else this.cache = {};
				} catch (e) { console.error("Failed to load cache", e); this.cache = {}; }
			}

			scheduleSaveCache() {
				if (this.saveTimeout) clearTimeout(this.saveTimeout);
				this.saveTimeout = setTimeout(()=>this.saveCache(), 1000);
			}

			saveCache() {
				try { localStorage.setItem('hijriCalcCache', JSON.stringify({ version: this.cacheVersion, data: this.cache })); }
				catch (e) { console.warn("Failed to save cache", e); }
			}

			savePreferences() {
				state.lat = parseFloat(elements.latInput.value);
				state.lon = parseFloat(elements.lonInput.value);
				state.lang = elements.language.value;
				state.weekStart = parseInt(elements.weekStart.value);
				state.hijriAdj = parseInt(elements.hijriAdj.value);
				state.primaryCalendar = elements.primaryCalendar.value;
				state.theme = elements.theme.value;
				state.calcMode = elements.calcMode.value;
				state.gMode = elements.gModeSelect.value;

				localStorage.setItem('hijriCalcState', JSON.stringify({
					lat: state.lat, lon: state.lon, lang: state.lang, weekStart: state.weekStart,
					hijriAdj: state.hijriAdj, primaryCalendar: state.primaryCalendar, theme: state.theme,
					calcMode: state.calcMode, gMode: state.gMode
				}));

				this.applyTheme(state.theme);
				this.updateLanguage(state.lang);
				this.render();
			}

			resetPreferences() {
				state.lat = 6.075;
				state.lon = 95.1125;
				state.lang = navigator.language?.startsWith('id') ? 'id' : 'en';
				state.theme = 'auto';
				state.weekStart = 0;
				state.hijriAdj = 0;
				state.primaryCalendar = 'gregorian';
				state.calcMode = this.isOffline ? 'linear' : 'astronomic';
				state.gMode = 'transition';

				elements.latInput.value = state.lat;
				elements.lonInput.value = state.lon;
				elements.language.value = state.lang;
				elements.weekStart.value = state.weekStart;
				elements.hijriAdj.value = state.hijriAdj;
				elements.primaryCalendar.value = state.primaryCalendar;
				elements.theme.value = state.theme;
				elements.calcMode.value = state.calcMode;
				elements.gModeSelect.value = state.gMode;

				this.savePreferences();
			}

			applyTheme(theme) { document.documentElement.className = theme === 'auto' ? '' : theme; elements.theme.value = theme; }
			getTimezoneOffset() { return Math.round(state.lon / 15); }

			setup() {
				elements.latInput.value = state.lat;
				elements.lonInput.value = state.lon;
				elements.language.value = state.lang;
				elements.weekStart.value = state.weekStart;
				elements.hijriAdj.value = state.hijriAdj;
				elements.primaryCalendar.value = state.primaryCalendar;
				elements.theme.value = state.theme;
				elements.calcMode.value = state.calcMode;
				elements.gModeSelect.value = state.gMode;

				if (this.isOffline) {
					elements.calcMode.value = 'linear';
					elements.calcMode.disabled = true;
				}

				this.setDateToInput(elements.gDateInput, new Date());

				text.en.months.forEach((month,index)=>{
					const option = document.createElement('option');
					option.value = index + 1;
					option.textContent = month;
					elements.hMonthInput.appendChild(option);
				});

				const hijri = this.gregorianToHijri(new Date());
				elements.hDayInput.value = hijri.day;
				elements.hMonthInput.value = hijri.month;
				elements.hYearInput.value = hijri.year;

				this.updateHijriDayLimit();

				elements.hMonthInput.addEventListener('change',()=>this.updateHijriDayLimit());
				elements.hYearInput.addEventListener('change',()=>this.updateHijriDayLimit());
				elements.hYearInput.addEventListener('input',()=>this.updateHijriDayLimit());

				elements.prefBtn.onclick = ()=>elements.prefDialog.showModal();
				elements.closePref.onclick = ()=>elements.prefDialog.close();
				elements.savePrefBtn.onclick = ()=>{
					this.savePreferences();
					elements.prefDialog.close();
				};
				elements.resetPrefBtn.onclick = ()=>{
					this.resetPreferences();
					elements.prefDialog.close();
				};
				elements.myLocBtn.onclick = ()=>this.getLocation();

				elements.todayBtn.onclick = ()=>{
					state.viewDate = new Date();
					this.setDateToInput(elements.gDateInput, state.viewDate);
					this.updateHijriInputs(state.viewDate);
					this.render();
					const today = elements.calendar.querySelector('.day-cell.selected') || elements.calendar.querySelector('.day-cell.today');
					if (today) today.focus();
				};

				elements.prevMonthBtn.onclick = ()=>this.navigateMonth(-1);
				elements.nextMonthBtn.onclick = ()=>this.navigateMonth(1);

				const handleGo = ()=>{
					const date = this.getDateFromInput(elements.gDateInput);
					if (date) {
						state.viewDate = date;
						this.updateHijriInputs(date);
						this.render();
					}
				};
				elements.gDateInput.addEventListener('change', handleGo);
				elements.gDateInput.addEventListener('keydown', e => {
					if (e.key === 'Enter') handleGo();
				});

				const handleGoH = ()=>{
					const day = parseInt(elements.hDayInput.value);
					const month = parseInt(elements.hMonthInput.value);
					const year = parseInt(elements.hYearInput.value);

					if (day && !isNaN(month) && year) {
						const gregorian = this.hijriToGregorian(year, month, day);
						state.viewDate = gregorian;
						this.render();
						this.setDateToInput(elements.gDateInput, gregorian);
					}
				};

				[elements.hDayInput, elements.hMonthInput, elements.hYearInput].forEach(el=>{
					el.addEventListener('change', handleGoH);
					el.addEventListener('keydown', e => {
						if (e.key === 'Enter') handleGoH();
					});
				});

				elements.calendar.addEventListener('keydown', e => {
					const keys = ['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown', 'Home', 'End', 'PageUp', 'PageDown', 'Enter', ' '];
					if (!keys.includes(e.key)) return;

					const cell = e.target.closest('.day-cell');
					if (!cell) return;

					if (e.key === 'Enter' || e.key === ' ') {
						e.preventDefault();
						return cell.click();
					}

					if (e.key === 'PageUp' || e.key === 'PageDown') {
						e.preventDefault();
						const currentDateStr = cell.dataset.date;
						if (!currentDateStr) return;

						const delta = (e.key === 'PageDown') ? 1 : -1;
						let targetDate;

						if (state.primaryCalendar === 'hijri') {
							const [year, month, day] = currentDateStr.split('-').map(Number);
							const hijri = this.gregorianToHijri(new Date(year, month - 1, day));
							let newMonth = hijri.month + delta;
							let newYear = hijri.year;
							while (newMonth > 12) { newMonth -= 12; newYear++; }
							while (newMonth < 1) { newMonth += 12; newYear--; }
							targetDate = this.hijriToGregorian(newYear, newMonth, hijri.day);
						} else {
							const [year, month, day] = currentDateStr.split('-').map(Number);
							const checkDate = new Date(year, month - 1 + delta, 1);
							const daysInMonth = new Date(checkDate.getFullYear(), checkDate.getMonth() + 1, 0).getDate();
							targetDate = new Date(checkDate.getFullYear(), checkDate.getMonth(), Math.min(day, daysInMonth));
						}

						this.navigateMonth(delta);

						const targetIso = `${String(targetDate.getFullYear()).padStart(4, '0')}-${String(targetDate.getMonth()+1).padStart(2,'0')}-${String(targetDate.getDate()).padStart(2,'0')}`;
						const targetCell = elements.calendar.querySelector(`.day-cell[data-date="${targetIso}"]`);

						if (targetCell) {
							cell.tabIndex = -1;
							targetCell.tabIndex = 0;
							targetCell.focus();
						} else {
							const first = elements.calendar.querySelector('.day-cell');
							if (first) {
								cell.tabIndex = -1;
								first.tabIndex = 0;
								first.focus();
							}
						}
						return;
					}

					e.preventDefault();
					const cells = Array.from(elements.calendar.querySelectorAll('.day-cell'));
					const index = cells.indexOf(cell);
					if (index === -1) return;

					let newIndex = index;
					if (e.key === 'ArrowRight') newIndex++;
					else if (e.key === 'ArrowLeft') newIndex--;
					else if (e.key === 'ArrowDown') newIndex += 7;
					else if (e.key === 'ArrowUp') newIndex -= 7;
					else if (e.key === 'Home') newIndex = 0;
					else if (e.key === 'End') newIndex = cells.length - 1;

					if (newIndex >= 0 && newIndex < cells.length) {
						cell.tabIndex = -1;
						cells[newIndex].tabIndex = 0;
						cells[newIndex].focus();
					}
				});
			}

			navigateMonth(delta) {
				if (state.primaryCalendar === 'hijri') {
					const hijri = this.gregorianToHijri(state.viewDate);
					let newMonth = hijri.month + delta;
					let newYear = hijri.year;
					while (newMonth > 12) { newMonth -= 12; newYear++; }
					while (newMonth < 1) { newMonth += 12; newYear--; }
					const start = this.getAccurateHijriMonthStart(newYear, newMonth);
					state.viewDate = new Date(start.gDate.getTime() + 15 * 86400000);
				} else {
					state.viewDate.setMonth(state.viewDate.getMonth() + delta);
				}
				this.render();
			}

			updateHijriInputs(date) {
				const hijri = this.gregorianToHijri(date);
				elements.hDayInput.value = hijri.day;
				elements.hMonthInput.value = String(hijri.month);
				elements.hYearInput.value = hijri.year;
				this.updateHijriDayLimit();
			}

			updateHijriDayLimit() {
				const month = parseInt(elements.hMonthInput.value);
				const year = parseInt(elements.hYearInput.value);
				if (!isNaN(month) && !isNaN(year)) {
					const currentStart = this.getAccurateHijriMonthStart(year, month);
					let nextMonth = month + 1;
					let nextYear = year;
					if (nextMonth > 12) {
						nextMonth = 1;
						nextYear++;
					}
					const nextStart = this.getAccurateHijriMonthStart(nextYear, nextMonth);
					const daysInMonth = Math.round((nextStart.gDate - currentStart.gDate) / 86400000);

					elements.hDayInput.max = daysInMonth;
					elements.hDayInput.placeholder = `1-${daysInMonth}`;

					if (parseInt(elements.hDayInput.value) > daysInMonth) {
						elements.hDayInput.value = daysInMonth;
					}
				}
			}

			getLocation() {
				const translation = text[state.lang];
				if (navigator.geolocation) {
					const button = elements.myLocBtn;
					button.disabled = true;
					button.innerHTML = `<span class="spinner"></span> ${translation.locating}`;

					navigator.geolocation.getCurrentPosition(
						p => {
							elements.latInput.value = p.coords.latitude.toFixed(4);
							elements.lonInput.value = p.coords.longitude.toFixed(4);
							button.disabled = false;
							button.textContent = translation.myLoc;
						},
						e => {
							console.error(e);
							alert(translation.errorLocation + e.message);
							button.disabled = false;
							button.textContent = translation.myLoc;
						}
					);
				} else {
					alert(translation.geoNotSupported);
				}
			}

			formatCoordinates(latitude, longitude) {
				const t = text[state.lang];
				const latDir = latitude >= 0 ? t.dirN : t.dirS;
				const lonDir = longitude >= 0 ? t.dirE : t.dirW;
				return `${Math.abs(latitude)}° ${latDir}, ${Math.abs(longitude)}° ${lonDir}`;
			}

			getDateFromInput(input) {
				if (!input.value) return null;
				const [year, month, day] = input.value.split('-').map(Number);
				return new Date(year, month - 1, day);
			}

			setDateToInput(input, date) {
				const year = String(date.getFullYear()).padStart(4, '0');
				const month = String(date.getMonth() + 1).padStart(2, '0');
				const day = String(date.getDate()).padStart(2, '0');
				input.value = `${year}-${month}-${day}`;
			}

			updateLanguage(language) {
				const translation = text[language];
				const weekDays = [translation.weekSun, translation.weekMon, null, null, null, null, translation.weekSat];

				document.querySelectorAll('[data-i18n]').forEach(el => {
					const key = el.getAttribute('data-i18n');
					if (translation[key]) el.textContent = translation[key];
				});

				document.querySelectorAll('[data-i18n-aria]').forEach(el => {
					const key = el.getAttribute('data-i18n-aria');
					if (translation[key]) el.setAttribute('aria-label', translation[key]);
				});

				document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
					const key = el.getAttribute('data-i18n-placeholder');
					if (translation[key]) el.placeholder = translation[key];
				});

				let suffix = "";
				if (this.isOffline) suffix = translation.offlineWarning;
				else if (state.calcMode === 'linear') suffix = translation.linearSuffix;
				else if (state.calcMode === 'tabular') suffix = translation.tabularSuffix;

				elements.appSubtitle.textContent = this.formatCoordinates(state.lat, state.lon) + suffix;

				[...elements.hMonthInput.options].forEach((opt,i) => opt.textContent = translation.months[i]);
				[...elements.theme.options].forEach(opt => opt.textContent = translation['theme' + opt.value.charAt(0).toUpperCase() + opt.value.slice(1)]);
				[...elements.primaryCalendar.options].forEach(opt => opt.textContent = translation['cal' + opt.value.charAt(0).toUpperCase() + opt.value.slice(1)]);
				[...elements.calcMode.options].forEach(opt => opt.textContent = translation['calcMode' + opt.value.charAt(0).toUpperCase() + opt.value.slice(1)]);
				[...elements.gModeSelect.options].forEach(opt => opt.textContent = translation['gMode' + opt.value.charAt(0).toUpperCase() + opt.value.slice(1)]);

				[...elements.weekStart.options].forEach(opt => {
					const day = weekDays[parseInt(opt.value)];
					if (day) opt.textContent = day;
				});

				this.updateFormulaDisplay();
			}

			updateFormulaDisplay() {
				const translation = text[state.lang];
				const isLinear = state.calcMode === 'linear';
				const isTabular = state.calcMode === 'tabular';

				elements.formulaDisplay.style.whiteSpace = "pre-line";
				elements.formulaDisplay.textContent = isTabular ?
					`JD = 1948440 + (Cycle \u00b7 10631) + YearStarts[Y_in_Cycle] + MonthOffsets[M_in_Year] + Day \u2212 1` :
					`JD = 1948440 + floor(29.530573265 \u00b7 N + 0.236624) + Day \u2212 1\nN = (Year \u2212 1) \u00b7 12 + Month \u2212 1`;

				elements.formulaNote.innerHTML = isTabular ?
					`<i>Global Tabular (Fixed Cycle). Leap Years: 1, 2, 5, 7, 10, 13, 16, 18, 21, 24, 26.</i>` :
					`<i>Global Formula (1\u201310000 AH). Epoch: 1 Muharram 1 AH = JD 1948440.</i>`;

				elements.formulaDesc.textContent = isTabular ? translation.formulaDescTabular : translation.formulaDesc;
			}

			getLinearMonthStartJD(Index) {
				if (state.calcMode === 'tabular') {
					const cycle = Math.floor(Index / 360), idxInCycle = ((Index % 360) + 360) % 360, yInCycle = Math.floor(idxInCycle / 12), mInYear = idxInCycle % 12,
						leaps = [1, 2, 5, 7, 10, 13, 16, 18, 21, 24, 26], isLeap = y => leaps.includes(y + 1);
					let days = cycle * 10631;
					for (let i = 0; i < yInCycle; i++) days += isLeap(i) ? 355 : 354;
					for (let i = 0; i < mInYear; i++) days += (i % 2 === 0) ? 30 : 29;
					return 1948440 + days;
				}
				return (1948440 + Math.floor(29.530573265 * Index + 0.236624));
			}

			getLinearIndexFromJD(JD) {
				if (state.calcMode === 'tabular') {
					let approxIdx = Math.round((JD - 1948440) / 29.530555);
					while (this.getLinearMonthStartJD(approxIdx + 1) <= JD) approxIdx++;
					while (this.getLinearMonthStartJD(approxIdx) > JD) approxIdx--;
					return approxIdx;
				}
				return Math.floor((JD - 1948440 + 0.763376) / 29.530573265);
			}

			jdToGregorianDate(jd) {
				const Z = Math.floor(jd + 0.5);
				const F = jd + 0.5 - Z;
				let A = Z;
				if (state.gMode === 'proleptic' || Z >= 2299161) {
					const alpha = Math.floor((Z - 1867216.25) / 36524.25);
					A = Z + 1 + alpha - Math.floor(alpha / 4);
				}
				const B = A + 1524;
				const C = Math.floor((B - 122.1) / 365.25);
				const D = Math.floor(365.25 * C);
				const E = Math.floor((B - D) / 30.6001);
				const day = B - D - Math.floor(30.6001 * E) + F;
				const month = (E < 14) ? E - 1 : E - 13;
				const year = (month > 2) ? C - 4716 : C - 4715;

				const date = new Date(0);
				date.setFullYear(year, month - 1, Math.floor(day));
				return date;
			}

			gregorianDateToJD(date) {
				let Y = date.getFullYear();
				let M = date.getMonth() + 1;
				const D = date.getDate();
				let B = 0;

				if (M <= 2) {
					Y--;
					M += 12;
				}

				if (state.gMode === 'proleptic' || Y > 1582 || (Y === 1582 && (M > 10 || (M === 10 && D >= 15)))) {
					const A = Math.floor(Y / 100);
					B = 2 - A + Math.floor(A / 4);
				}
				return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + D + B - 1524;
			}

			hijriToGregorianLinear(hYear, hMonth, hDay) {
				const Index = (hYear - 1) * 12 + hMonth - 1;
				const JD = this.getLinearMonthStartJD(Index) + hDay - 1 + state.hijriAdj;
				return this.jdToGregorianDate(JD);
			}

			hijriToGregorian(hYear, hMonth, hDay) {
				if (this.isOffline || state.calcMode !== 'astronomic') return this.hijriToGregorianLinear(hYear, hMonth, hDay);
				const start = this.getAccurateHijriMonthStart(hYear, hMonth);
				const gregorian = new Date(start.gDate);
				gregorian.setDate(gregorian.getDate() + (hDay - 1));
				return gregorian;
			}

			gregorianToHijriLinear(date) {
				let JD = this.gregorianDateToJD(date);
				JD -= state.hijriAdj;
				let Index = this.getLinearIndexFromJD(JD);
				let jdStart = this.getLinearMonthStartJD(Index);
				const hDay = JD - jdStart + 1;
				const hYear = Math.floor(Index / 12) + 1;
				let hMonth = (Index % 12);
				if (hMonth < 0) hMonth += 12;
				return { day: hDay, month: hMonth + 1, year: hYear };
			}

			gregorianToHijri(date) {
				if (this.isOffline || state.calcMode !== 'astronomic') return this.gregorianToHijriLinear(date);
				const approx = this.gregorianToHijriLinear(date);
				const startCurrent = this.getAccurateHijriMonthStart(approx.year, approx.month);
				const dateTime = date.getTime();
				const startTime = startCurrent.gDate.getTime();
				if (dateTime < startTime) {
					let prevMonth = approx.month - 1;
					let prevYear = approx.year;
					if (prevMonth < 1) { prevMonth = 12; prevYear--; }
					const startPrev = this.getAccurateHijriMonthStart(prevYear, prevMonth);
					const day = Math.round((dateTime - startPrev.gDate.getTime()) / 86400000) + 1;
					return { day: day, month: prevMonth, year: prevYear };
				}
				let nextMonth = approx.month + 1;
				let nextYear = approx.year;
				if (nextMonth > 12) { nextMonth = 1; nextYear++; }
				const startNext = this.getAccurateHijriMonthStart(nextYear, nextMonth);
				const nextTime = startNext.gDate.getTime();
				if (dateTime >= nextTime) {
					const day = Math.round((dateTime - nextTime) / 86400000) + 1;
					return { day: day, month: nextMonth, year: nextYear };
				}
				const day = Math.round((dateTime - startTime) / 86400000) + 1;
				return { day: day, month: approx.month, year: approx.year };
			}

			checkVisibility(dateObj, knownNewMoonUT) {
				// dateObj is expected to be a Date object centered roughly on the check day (e.g. noon UTC).
				const date = Astronomy.MakeTime(dateObj);
				const observer = new Astronomy.Observer(state.lat, state.lon, 0);

				// Search for sunset on the given date (limit search window to +/- 1 day to be safe, but start at dateObj)
				const sunset = Astronomy.SearchRiseSet(Astronomy.Body.Sun, observer, -1, date.ut, 1);
				if (!sunset) return false;
				const sunsetUT = sunset.ut;

				let newMoonUT = knownNewMoonUT;
				if (newMoonUT === undefined || newMoonUT === null) {
					const bestNewMoon = Astronomy.SearchMoonPhase(0, date.ut, -35);
					if (!bestNewMoon) return false;
					newMoonUT = bestNewMoon.ut;
				}

				const age = sunsetUT - newMoonUT;
				if (age < 0) return false;

				const moonEq = Astronomy.Equator(Astronomy.Body.Moon, sunsetUT, observer, true, true);
				const moonHor = Astronomy.Horizon(sunsetUT, observer, moonEq.ra, moonEq.dec, "normal");
				const sunEq = Astronomy.Equator(Astronomy.Body.Sun, sunsetUT, observer, true, true);
				const elongation = Astronomy.AngleBetween(sunEq.vec, moonEq.vec);

				// MABBIMS Criteria (Topocentric): Altitude >= 3 deg, Elongation >= 6.4 deg, Age > 0 (implied)
				return (moonHor.altitude >= 3.0 && elongation >= 6.4);
			}

			getAccurateHijriMonthStart(hYear, hMonth) {
				if (this.isOffline || state.calcMode !== 'astronomic' || (hYear < 1300)) {
					return { gDate: this.hijriToGregorianLinear(hYear, hMonth, 1) };
				}

				if (!this.cache) this.loadCache();

				const cacheKey = `${hYear}-${hMonth}-${state.lat}-${state.lon}-${state.gMode}`;
				if (this.cache[cacheKey]) {
					if (typeof this.cache[cacheKey].gDate === 'string') {
						this.cache[cacheKey].gDate = new Date(this.cache[cacheKey].gDate);
					}
					return this.cache[cacheKey];
				}

				const daysSinceAnchor = ((hYear - 1445) * 354.367) + ((hMonth - 1) * 29.53);
				const anchorDate = new Date("2023-07-19T12:00:00Z");
				const approxDate = new Date(anchorDate.getTime() + daysSinceAnchor * 86400000);
				const searchStart = new Date(approxDate.getTime() - 5 * 86400000);
				const timeStart = Astronomy.MakeTime(searchStart);

				let bestNewMoon = Astronomy.SearchMoonPhase(0, timeStart.ut, 10);
				if (!bestNewMoon || Math.abs(bestNewMoon.date - approxDate) > 4 * 86400000) {
					return { gDate: approxDate };
				}

				const newMoonDate = bestNewMoon.date;
				const utcOffset = this.getTimezoneOffset();
				const localNMTime = newMoonDate.getTime() + (utcOffset * 3600000);
				const localNMDate = new Date(localNMTime);
				const y = localNMDate.getUTCFullYear();
				const m = localNMDate.getUTCMonth();
				const d = localNMDate.getUTCDate();
				const searchCenterUTC = new Date(Date.UTC(y, m, d, 12 - utcOffset, 0, 0));

				const isVisible = this.checkVisibility(searchCenterUTC, bestNewMoon.ut);
				const startDay = d + (isVisible ? 1 : 2);

				const result = { gDate: new Date(y, m, startDay) };
				this.cache[cacheKey] = result;
				this.scheduleSaveCache();
				return result;
			}

			createDayCell(date, hijriInfo, isSelected, isToday, isOtherMonth, isFriday) {
				const element = document.createElement('div');
				const translation = text[state.lang];
				const isGregorianMode = state.primaryCalendar !== 'hijri';
				const jd = this.gregorianDateToJD(date);
				const isJulian = (state.gMode === 'transition' && jd < 2299161);

				const gMonthFull = date.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', { month: 'long' });
				const gMonthShort = date.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', { month: 'short' });

				const primaryValue = isGregorianMode ? date.getDate() : hijriInfo.day;
				const secondaryValue = isGregorianMode ? hijriInfo.day : date.getDate();

				const isFirstInGrid = (hijriInfo.index === 0);
				const isNewGregorianMonth = (date.getDate() === 1);
				const isNewHijriMonth = (hijriInfo.day === 1);
				const isMonthStart = isGregorianMode ? isNewHijriMonth : isNewGregorianMonth;
				const showSecondaryMonth = isFirstInGrid || isMonthStart;

				const secondaryMonthLabel = showSecondaryMonth ? ` <span class="month-full">${isGregorianMode ? hijriInfo.monthName : gMonthFull}</span><span class="month-short">${isGregorianMode ? hijriInfo.monthNameShort : gMonthShort}</span>` : "";
				const primaryText = primaryValue + (isGregorianMode && isJulian ? `<span class="julian-label">(${translation.julian})</span>` : "");
				const secondaryText = secondaryValue + (!isGregorianMode && isJulian ? `<span class="julian-label">(${translation.julian})</span>` : "");
				const fullDate = date.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) + (isJulian ? ` (${translation.julian})` : "");

				element.className = 'day-cell';
				element.setAttribute('role', 'gridcell');
				element.tabIndex = -1;

				if (isFriday) element.classList.add('friday-cell');
				if (isOtherMonth) element.classList.add('other-month');

				if (isToday) {
					element.classList.add('today');
					element.setAttribute('aria-current', 'date');
				}

				if (isSelected) {
					element.classList.add('selected');
					element.setAttribute('aria-selected', 'true');
				}

				element.onclick = () => {
					this.setDateToInput(elements.gDateInput, date);
					this.updateHijriInputs(date);
					this.render();
					const selected = elements.calendar.querySelector('.day-cell.selected');
					if (selected) selected.focus();
				};

				element.setAttribute('aria-label', `${fullDate}, ${hijriInfo.day} ${hijriInfo.monthName}`);
				element.dataset.date = `${String(date.getFullYear()).padStart(4, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
				element.innerHTML = `
					<div class="primary-date">${primaryText}</div>
					<div class="secondary-date ${isMonthStart ? 'secondary-month-start' : ''}">${secondaryText}${secondaryMonthLabel}</div>
				`;
				return element;
			}

			getDOW(jd) { return (Math.floor(jd + 1.5) % 7); }

			render() {
				const grid = elements.calendar;
				const translation = text[state.lang];

				if (state.primaryCalendar !== 'hijri') {
					const year = state.viewDate.getFullYear();
					const month = state.viewDate.getMonth();
					elements.monthDisplay.textContent = state.viewDate.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', { month: 'long', year: 'numeric' });

					const firstJD = this.gregorianDateToJD(new Date(year, month, 1));
					const hStart = this.gregorianToHijri(new Date(year, month, 1));
					const hEnd = this.gregorianToHijri(new Date(year, month + 1, 0));
					elements.hijriRangeDisplay.textContent = `${translation.months[hStart.month - 1]} ${hStart.year} - ${translation.months[hEnd.month - 1]} ${hEnd.year}`;

					let offset = this.getDOW(firstJD) - state.weekStart;
					if (offset < 0) offset += 7;
					this.renderGrid(firstJD - offset, true, { month, year });
				} else {
					const hijri = this.gregorianToHijri(state.viewDate);
					const currentStart = this.getAccurateHijriMonthStart(hijri.year, hijri.month);
					let nextMonth = hijri.month + 1;
					let nextYear = hijri.year;
					if (nextMonth > 12) {
						nextMonth = 1;
						nextYear++;
					}
					const nextStart = this.getAccurateHijriMonthStart(nextYear, nextMonth);

					elements.monthDisplay.textContent = `${translation.months[hijri.month - 1]} ${hijri.year}`;
					const gStart = currentStart.gDate;
					const gEnd = new Date(nextStart.gDate.getTime() - 86400000);
					elements.hijriRangeDisplay.textContent = `${gStart.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', { month: 'long', year: 'numeric' })} - ${gEnd.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', { month: 'long', year: 'numeric' })}`;

					const startJD = this.gregorianDateToJD(currentStart.gDate);
					let offset = this.getDOW(startJD) - state.weekStart;
					if (offset < 0) offset += 7;
					this.renderGrid(startJD - offset, false, { hMonth: hijri.month, hYear: hijri.year, startJD, endJD: this.gregorianDateToJD(nextStart.gDate) });
				}
			}

			renderGrid(startJD, isGregorianMode, context) {
				const grid = elements.calendar;
				const translation = text[state.lang];
				const fragment = document.createDocumentFragment();

				grid.setAttribute('role', 'grid');
				grid.innerHTML = '';

				for (let index = 0; index < 7; index++) {
					const dayIndex = (state.weekStart + index) % 7;
					const element = document.createElement('div');
					element.className = 'day-header';
					if (dayIndex === 5) element.classList.add('friday-header');
					element.textContent = translation.days[dayIndex];
					element.setAttribute('role', 'columnheader');
					fragment.appendChild(element);
				}

				let hijriStarts = [];
				if (isGregorianMode) {
					const startHijri = this.gregorianToHijri(this.jdToGregorianDate(startJD));
					let hMonthIndex = startHijri.month;
					let hYear = startHijri.year;
					for (let index = -1; index <= 3; index++) {
						let month = hMonthIndex + index;
						let year = hYear;
						while (month > 12) { month -= 12; year++; }
						while (month < 1) { month += 12; year--; }
						const start = this.getAccurateHijriMonthStart(year, month);
						hijriStarts.push({ year, month, jd: this.gregorianDateToJD(start.gDate) });
					}
					hijriStarts.sort((a,b) => a.jd - b.jd);
				}

				const todayJD = this.gregorianDateToJD(new Date());
				const selectedDate = this.getDateFromInput(elements.gDateInput);
				const selectedJD = selectedDate ? this.gregorianDateToJD(selectedDate) : -1;

				for (let index = 0; index < 42; index++) {
					const currentJD = startJD + index;
					const date = this.jdToGregorianDate(currentJD);
					const hijriInfo = this.getHijriInfoForCellJD(currentJD, isGregorianMode, context, hijriStarts);
					hijriInfo.index = index;

					const isOtherMonth = isGregorianMode ? (date.getMonth() !== context.month) : (currentJD < context.startJD || currentJD >= context.endJD);
					const isToday = (currentJD === todayJD);
					const isSelected = (currentJD === selectedJD);
					const isFriday = (this.getDOW(currentJD) === 5);

					const element = this.createDayCell(date, hijriInfo, isSelected, isToday, isOtherMonth, isFriday);
					fragment.appendChild(element);
				}

				grid.appendChild(fragment);

				const cells = grid.querySelectorAll('.day-cell');
				const focusCandidate = grid.querySelector('.day-cell.selected') || grid.querySelector('.day-cell.today') || (cells.length > 0 ? cells[0] : null);
				if (focusCandidate) focusCandidate.tabIndex = 0;
			}

			getHijriInfoForCellJD(jd, isGregorianMode, context, hijriStarts) {
				const translation = text[state.lang];
				let hijriDay = "";
				let hijriMonthName = "";
				let hijriMonthNameShort = "";

				if (isGregorianMode) {
					for (let k = 0; k < hijriStarts.length - 1; k++) {
						const s1 = hijriStarts[k];
						const s2 = hijriStarts[k+1];
						if (jd >= s1.jd && jd < s2.jd) {
							hijriDay = Math.round(jd - s1.jd) + 1;
							hijriMonthName = translation.months[s1.month - 1];
							hijriMonthNameShort = translation.monthsShort[s1.month - 1];
							break;
						}
					}
				} else {
					if (jd >= context.startJD && jd < context.endJD) {
						hijriDay = Math.round(jd - context.startJD) + 1;
						hijriMonthName = translation.months[context.hMonth - 1];
						hijriMonthNameShort = translation.monthsShort[context.hMonth - 1];
					} else if (jd < context.startJD) {
						let prevMonth = context.hMonth - 1;
						let prevYear = context.hYear;
						if (prevMonth < 1) {
							prevMonth += 12;
							prevYear--;
						}
						const prevStart = this.getAccurateHijriMonthStart(prevYear, prevMonth);
						const prevJD = this.gregorianDateToJD(prevStart.gDate);
						hijriDay = Math.round(jd - prevJD) + 1;
						hijriMonthName = translation.months[prevMonth - 1];
						hijriMonthNameShort = translation.monthsShort[prevMonth - 1];
					} else {
						let nextMonth = context.hMonth + 1;
						let nextYear = context.hYear;
						if (nextMonth > 12) {
							nextMonth = 1;
							nextYear++;
						}
						const nextStart = this.getAccurateHijriMonthStart(nextYear, nextMonth);
						const nextJD = this.gregorianDateToJD(nextStart.gDate);
						hijriDay = Math.round(jd - nextJD) + 1;
						hijriMonthName = translation.months[nextMonth - 1];
						hijriMonthNameShort = translation.monthsShort[nextMonth - 1];
					}
				}
				return { day: hijriDay, monthName: hijriMonthName, monthNameShort: hijriMonthNameShort };
			}
		}
		new HijriCalc();
	</script>
</body>
</html>
