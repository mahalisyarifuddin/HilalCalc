<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>MABBIMS Hijri Calendar</title>
		<style>
			:root {
				--primary: #005dac;
				--on-primary: #ffffff;
				--hover: #00539a;
				--background: #f9f9ff;
				--surface: #ffffff;
				--text: #181c21;
				--border: #c1c6d4;
				--muted: #f2f3fc;
				--success: #0b6b1d;
				--on-success: #ffffff;
				--danger: #ba1a1a;
				--on-danger: #ffffff;
				--highlight-bg: #d4e3ff;
				--accent: #f57c00;
				--accent-bg: #fff8f0;
				--radius: 8px;
			}
			@media (prefers-color-scheme: dark) {
				:root:not(.light) {
					--primary: #a5c8ff;
					--on-primary: #00315f;
					--hover: #72adff;
					--background: #101319;
					--surface: #0b0e14;
					--text: #e0e2ea;
					--border: #414752;
					--muted: #181c21;
					--success: #82db7e;
					--on-success: #00390a;
					--danger: #ffb4ab;
					--on-danger: #93000a;
					--highlight-bg: #001c3a;
					--accent-bg: #1f1600;
				}
			}
			:root.dark {
				--primary: #a5c8ff;
				--on-primary: #00315f;
				--hover: #72adff;
				--background: #101319;
				--surface: #0b0e14;
				--text: #e0e2ea;
				--border: #414752;
				--muted: #181c21;
				--success: #82db7e;
				--on-success: #00390a;
				--danger: #ffb4ab;
				--on-danger: #93000a;
				--highlight-bg: #001c3a;
				--accent-bg: #1f1600;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			*:focus-visible {
				outline: 2px solid var(--primary);
				outline-offset: 2px;
			}
			body {
				background: var(--background);
				color: var(--text);
				font-family: sans-serif;
				line-height: 1.25;
				padding: 1.5rem;
				min-height: 100vh;
			}
			header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 2rem;
				max-width: 1600px;
				margin-left: auto;
				margin-right: auto;
			}
			h1 {
				margin: .5rem 0;
				font-size: 2rem;
				font-weight: 600;
			}
			main {
				display: grid;
				grid-template-columns: 330px 1fr;
				gap: 1.5rem;
				max-width: 1600px;
				margin: 0 auto;
			}
			section {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 1.5rem;
				min-width: 0;
			}
			.section-title {
				margin: .5rem 0 1rem;
				border-bottom: 1px solid var(--border);
				padding-bottom: .75rem;
				font-size: 1.2rem;
				font-weight: 600;
			}
			#prefBtn, .nav-btn, .dlg-foot button, #myLocBtn, .close-button {
				width: auto;
				margin-top: 0;
			}
			.group {
				background: var(--background);
				border: 1px solid var(--border);
				padding: 1rem;
				border-radius: 6px;
				margin-bottom: 1rem;
				position: relative;
			}
			.topbar-info {
				flex: 1;
				min-width: 0;
			}

			#appSubtitle {
				font-size: .8rem;
				opacity: .6;
				margin-top: 4px;
			}

			.inputs {
				display: flex;
				flex-direction: column;
				gap: 6px;
			}

			.input-row {
				display: flex;
				gap: 6px;
				align-items: center;
			}

			.input-row > * {
				flex: 1;
			}

			.lbl {
				font-size: .7rem;
				font-weight: 600;
				opacity: .6;
				margin-bottom: 2px;
				display: block;
			}

			input:not([type=color]):not([type=range]), textarea, select, button {
				width: 100%;
				padding: .5rem .75rem;
				border: 1px solid var(--border);
				border-radius: 4px;
				background: var(--surface);
				color: var(--text);
				margin-top: 4px;
				font-family: inherit;
				font-size: .95rem;
			}
			label {
				display: block;
				margin-bottom: .5rem;
				font-weight: 500;
				font-size: .9rem;
			}

			#hDayInput {
				flex: 1;
			}

			#hMonthInput {
				flex: 2;
			}

			#hYearInput {
				flex: 1.5;
			}

			.cal-card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				overflow: hidden;
			}

			.cal-head {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 10px 12px 6px;
			}

			.cal-title {
				flex: 1;
				text-align: center;
			}

			.cal-title-text {
				font-size: 1rem;
				font-weight: 700;
			}

			.cal-subtitle {
				font-size: .7rem;
				opacity: .55;
				margin-top: 1px;
			}

			.nav-btn {
				background: var(--muted);
				border: 1px solid var(--border);
				border-radius: 6px;
				color: var(--text);
				cursor: pointer;
				font-size: .8rem;
				padding: 5px 8px;
				white-space: nowrap;
				transition: background .15s;
				width: auto;
				flex: none;
			}

			.nav-btn:hover {
				background: var(--border);
			}

			.today-btn {
				display: block;
				margin: 0 12px 8px;
				width: calc(100% - 24px);
				background: transparent;
				border: 1px dashed var(--border);
				border-radius: 6px;
				color: var(--text);
				cursor: pointer;
				font-size: .75rem;
				font-weight: 600;
				padding: 4px;
				transition: background .15s, border-color .15s;
			}

			.today-btn:hover {
				background: var(--muted);
				border-color: var(--primary);
			}

			.cal-grid {
				display: grid;
				grid-template-columns: repeat(7, 1fr);
				border-top: 1px solid var(--border);
			}

			.day-hdr {
				padding: 6px 2px;
				text-align: center;
				font-size: .7rem;
				font-weight: 700;
				opacity: .5;
				border-bottom: 1px solid var(--border);
			}

			.day-hdr.fri {
				color: var(--accent);
				opacity: 1;
			}

			.cell {
				padding: 4px 2px;
				min-height: 52px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				border-radius: 0;
				transition: background .12s;
				position: relative;
			}

			.cell:hover {
				background: var(--muted);
			}

			.cell.fri-cell {
				background: var(--accent-bg);
			}

			.cell.fri-cell:hover {
				background: var(--muted);
			}

			.cell.other {
				opacity: .25;
			}

			.cell.sel {
				background: var(--highlight-bg);
			}

			.cell.sel.fri-cell {
				background: var(--highlight-bg);
			}

			.cell.today::after {
				content: '';
				position: absolute;
				inset: 0px;
				border: 2px solid var(--primary);
				pointer-events: none;
			}

			.cell.today .pdate {
				color: var(--primary);
				font-weight: 800;
			}

			.pdate {
				font-size: .95rem;
				font-weight: 700;
				line-height: 1;
			}

			.sdate {
				font-size: .65rem;
				opacity: .55;
				text-align: center;
				line-height: 1.3;
				margin-top: 2px;
			}

			.sdate.new-m {
				color: var(--success);
				opacity: 1;
				font-weight: 700;
			}

			.jul-lbl {
				font-size: .5rem;
				opacity: .7;
				vertical-align: super;
			}

			.detail-section {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				padding: 8px 12px;
			}

			details summary {
				cursor: pointer;
				font-size: .8rem;
				opacity: .65;
				user-select: none;
				list-style: none;
				display: flex;
				align-items: center;
				gap: 6px;
			}

			details summary::before {
				content: '▶';
				font-size: .6rem;
				transition: transform .2s;
			}

			details[open] summary::before {
				transform: rotate(90deg);
			}

			details summary:hover {
				opacity: 1;
				color: var(--primary);
			}

			.formula-box {
				font-family: 'Courier New', monospace;
				font-size: .78rem;
				background: var(--muted);
				border: 1px solid var(--border);
				border-radius: 6px;
				padding: 8px;
				margin-top: 6px;
				white-space: pre-line;
			}

			.formula-note {
				font-size: .72rem;
				opacity: .65;
				margin-top: 6px;
			}

			.footer-note {
				font-size: .7rem;
				opacity: .5;
				margin-top: 8px;
				text-align: center;
			}

			button {
				font-family: inherit;
				cursor: pointer;
				border-radius: 6px;
				transition: background .15s;
			}

			.btn-pri {
				background: var(--primary);
				color: var(--on-primary);
				border: 0;
				padding: 7px 14px;
				font-size: .875rem;
				font-weight: 600;
			}

			.btn-pri:hover {
				background: var(--hover);
			}

			.btn-sec {
				background: transparent;
				border: 1px solid var(--border);
				color: var(--text);
				padding: 7px 14px;
				font-size: .875rem;
			}

			.btn-sec:hover {
				background: var(--muted);
			}

			.btn-icon {
				background: transparent;
				border: 1px solid var(--border);
				color: var(--text);
				padding: 6px 10px;
				font-size: .85rem;
				flex-shrink: 0;
			}

			.btn-icon:hover {
				background: var(--muted);
			}

			dialog {
				background: var(--surface);
				color: var(--text);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 1.5rem;
				max-width: 400px;
				width: 100%;
				margin: auto;
				position: fixed;
				box-shadow: 0 8px 40px rgba(0,0,0,.2);
			}
			dialog::backdrop {
				background: rgba(0, 0, 0, 0.5);
			}
			.dialog-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 1.5rem;
			}
			.dialog-header h3 {
				font-size: 1.25rem;
				font-weight: 600;
			}
			.dlg-body {
				display: flex;
				flex-direction: column;
				gap: 12px;
				max-height: 70vh;
				overflow-y: auto;
			}

			.dlg-foot {
				display: flex;
				gap: 8px;
				margin-top: 1rem;
				justify-content: flex-end;
			}

			.field-row {
				display: flex;
				gap: 8px;
			}

			.field-row > * {
				flex: 1;
			}

			.dlg-section-head {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-bottom: 4px;
			}

			.btn-link {
				background: none;
				border: none;
				color: var(--primary);
				font-size: .8rem;
				padding: 0;
				cursor: pointer;
			}

			.btn-link:hover {
				text-decoration: underline;
			}

			.close-button {
				background: transparent;
				color: var(--text);
				padding: .25rem;
				font-size: 1.5rem;
				line-height: 1;
				border: none;
			}
			.close-button:hover {
				background: var(--background);
				color: var(--text);
			}

			.offline-warn {
				background: color-mix(in srgb, var(--danger) 12%, var(--surface));
				border: 1px solid color-mix(in srgb, var(--danger) 30%, var(--border));
				border-radius: 8px;
				padding: 8px 12px;
				font-size: .8rem;
				color: var(--danger);
				text-align: center;
			}

			.sr {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0,0,0,0);
				border: 0;
			}

			.spinner {
				display: inline-block;
				width: .9em;
				height: .9em;
				border: 2px solid currentColor;
				border-right-color: transparent;
				border-radius: 50%;
				animation: spin .75s linear infinite;
				vertical-align: middle;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			@media (max-width: 900px) {
				main {
					grid-template-columns: 1fr;
				}
			}

			@media (max-width: 380px) {
				.pdate {
					font-size: .85rem;
				}

				.sdate {
					font-size: .6rem;
				}

				.cell {
					min-height: 46px;
				}

				.nav-btn {
					padding: 5px 7px;
					font-size: .75rem;
					width: auto;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<div class="topbar-info">
				<h1 id="appTitle"></h1>
				<div id="appSubtitle"></div>
			</div>
			<button id="prefBtn" class="btn-icon" data-i18n-aria="prefTitle"></button>
		</header>
		<main>
			<section>
				<div class="section-title" id="navTitle"></div>
				<div class="inputs" aria-label="Date navigation">
					<div class="group">
						<label for="gDateInput" id="gLbl"></label>
						<input type="date" id="gDateInput">
					</div>
					<div class="group">
						<label id="hLbl"></label>
						<div class="input-row">
							<input type="number" id="hDayInput" placeholder="D" min="1" max="30" aria-label="Day">
							<select id="hMonthInput" aria-label="Month"></select>
							<input type="number" id="hYearInput" placeholder="Year" min="1300" max="2500" aria-label="Year">
						</div>
					</div>
				</div>
			</section>
			<section>
				<div class="section-title" id="calTitle"></div>
				<div class="cal-card">
					<div class="cal-head">
						<button id="prevMonthBtn" class="nav-btn"></button>
						<div class="cal-title">
							<div id="monthDisplay" class="cal-title-text"></div>
							<div id="hijriRangeDisplay" class="cal-subtitle"></div>
						</div>
						<button id="nextMonthBtn" class="nav-btn"></button>
					</div>
					<button id="todayBtn" class="today-btn"></button>
					<div class="cal-grid" id="calendar" role="grid"></div>
				</div>
				<div class="detail-section" style="margin-top: 1.5rem;">
					<details>
						<summary>
							<span id="formulaTitle"></span>
						</summary>
						<pre id="formulaDisplay" class="formula-box"></pre>
						<p id="formulaDesc" class="formula-note"></p>
						<p id="formulaNote" class="formula-note"></p>
						<p id="footerNote" class="footer-note"></p>
					</details>
				</div>
			</section>
		</main>
		<dialog id="prefDialog">
			<div class="dialog-header">
				<h3 id="prefTitle"></h3>
				<button id="closePref" class="close-button" aria-label="Close">&times;</button>
			</div>
			<div class="group">
				<label><span id="langLabel"></span><select id="language"><option value="en">English</option><option value="id">Bahasa Indonesia</option></select></label>
				<label><span id="themeLabel"></span><select id="theme"><option value="auto">Auto</option><option value="light">Light</option><option value="dark">Dark</option></select></label>
				<label><span id="primaryCalLabel"></span><select id="primaryCalendar"><option value="gregorian">Gregorian</option><option value="hijri">Hijri</option></select></label>
				<label><span id="weekStartLabel"></span><select id="weekStart"><option value="0">Sunday</option><option value="1">Monday</option><option value="6">Saturday</option></select></label>
			</div>
			<div class="group">
				<label><span id="gModeLabel"></span><select id="gModeSelect"><option value="transition">Historical (1582)</option><option value="proleptic">Continuous</option></select></label>
				<label><span id="calcModeLabel"></span><select id="calcMode"><option value="astronomic">MABBIMS</option><option value="linear">Linear</option><option value="tabular">Tabular</option></select></label>
				<div style="display: flex; justify-content: space-between; align-items: flex-end; margin: 0.5rem 0 0.25rem;">
					<span id="locLabel" style="font-weight: 500; font-size: 0.9rem;"></span>
					<button id="myLocBtn" class="btn-link"></button>
				</div>
				<div class="field-row">
					<label><span id="latLabel"></span><input type="number" id="latInput" step="0.0001"></label>
					<label><span id="lonLabel"></span><input type="number" id="lonInput" step="0.0001"></label>
				</div>
				<label><span id="adjLabel"></span><input type="number" id="hijriAdj" value="0" min="-2" max="2"></label>
				<div id="adjNote" style="opacity:.6;font-size:.72rem;margin-top:-0.25rem;"></div>
			</div>
			<div class="dlg-foot">
				<button id="resetPrefBtn" class="btn-sec"></button>
				<button id="savePrefBtn" class="btn-pri"></button>
			</div>
		</dialog>
		<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

					save: 'Simpan & Tutup',
					reset: 'Atur Ulang',
					closeLabel: 'Tutup',
					myLoc: 'Gunakan lokasi saya',
					locating: 'Mencari…',
					months: ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab", "Syaban", "Ramadhan", "Syawal", "Dzulkaidah", "Dzulhijjah"],
					monthsShort: ["Muh", "Saf", "Raw", "Rak", "Jaw", "Jak", "Raj", "Sya", "Ram", "Syaw", "Dzk", "Dzh"],
					days: ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'],
					footer: '* Tanggal dimulai saat maghrib. MABBIMS: Alt ≥ 3°, Elong ≥ 6.4°.',
					gDateLabel: 'Tanggal Masehi',
					hDateLabel: 'Tanggal Hijriyah',
					hDay: 'Tgl',
					hYear: 'Tahun',
					prevBtn: '← Sblm',
					nextBtn: 'Lanjut →',
					offlineWarning: 'Offline: Menggunakan aproksimasi linear',
					geoNotSupported: 'Geolokasi tidak didukung.',
					errorLocation: 'Gagal lokasi: ',
					latLabel: 'Lintang',
					lonLabel: 'Bujur',
					adjNote: 'Menggeser rumus linear.',
					calcModeLabel: 'Metode Hijri',
					calcModeAstronomic: 'MABBIMS',
					calcModeLinear: 'Linear',
					calcModeTabular: 'Tabular',
					linearSuffix: ' (Linear)',
					tabularSuffix: ' (Tabular)',
					criteria: 'Kriteria',
					altitude: 'Tinggi',
					elongation: 'Elongasi',
					gModeLabel: 'Mode Masehi',
					gModeTransition: 'Sejarah (1582)',
					gModeProleptic: 'Berkelanjutan',
					julian: 'Jul',
					dirN: 'LU',
					dirS: 'LS',
					dirE: 'BT',
					dirW: 'BB',
					themeAuto: 'Otomatis',
					themeLight: 'Terang',
					themeDark: 'Gelap',
					calGregorian: 'Masehi',
					calHijri: 'Hijriyah',
					weekSun: 'Minggu',
					weekMon: 'Senin',
					weekSat: 'Sabtu',
				}
			};

			const $ = id=>document.getElementById(id);
			let state = {
				lat: 6.075,
				lon: 95.1125,
				lang: navigator.language?.startsWith('id') ? 'id' : 'en',
				theme: 'auto',
				weekStart: 0,
				hijriAdj: 0,
				primaryCalendar: 'gregorian',
				calcMode: 'astronomic',
				gMode: 'transition',
				viewDate: new Date()
			};

			class HijriCalc {
				constructor() {
					this.offline = (typeof Astronomy === 'undefined');
					this.cache = null;
					this.loadState();
					state.viewDate = new Date();
					this.bindUI();
					this.applyTheme(state.theme);
					this.syncFormFields();
					this.updateLang(state.lang);
					this.render();
					if (this.offline)
						this.showOfflineWarning();
				}

				loadState() {
					try {
						const s = JSON.parse(localStorage.getItem('hcState') || '{}');
						['lat', 'lon', 'lang', 'theme', 'weekStart', 'hijriAdj', 'primaryCalendar', 'calcMode', 'gMode'].forEach(k=>{
							if (s[k] !== undefined)
								state[k] = s[k];
						}
						);
					} catch (e) {}
				}
				saveState() {
					const {lat, lon, lang, theme, weekStart, hijriAdj, primaryCalendar, calcMode, gMode} = state;
					localStorage.setItem('hcState', JSON.stringify({
						lat,
						lon,
						lang,
						theme,
						weekStart,
						hijriAdj,
						primaryCalendar,
						calcMode,
						gMode
					}));
				}
				loadCache() {
					try {
						this.cache = JSON.parse(localStorage.getItem('hcCache') || '{}');
					} catch (e) {
						this.cache = {};
					}
				}
				schedSaveCache() {
					clearTimeout(this._cst);
					this._cst = setTimeout(()=>{
						try {
							localStorage.setItem('hcCache', JSON.stringify(this.cache));
						} catch (e) {}
					}
					, 1000);
				}

				showOfflineWarning() {
					const w = document.createElement('div');
					w.className = 'offline-warn';
					w.setAttribute('data-i18n', 'offlineWarning');
					w.textContent = T[state.lang].offlineWarning;
					document.body.prepend(w);
				}
				applyTheme(t) {
					document.documentElement.className = t === 'auto' ? '' : t;
				}
				fmtCoords(lat, lon) {
					const tr = T[state.lang];
					return `${Math.abs(lat).toFixed(4)}° ${lat >= 0 ? tr.dirN : tr.dirS}, ${Math.abs(lon).toFixed(4)}° ${lon >= 0 ? tr.dirE : tr.dirW}`;
				}
				setInput(inp, d) {
					inp.value = `${String(d.getFullYear()).padStart(4, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
				}
				getInput(inp) {
					if (!inp.value)
						return null;
					const [y,m,d] = inp.value.split('-').map(Number);
					return new Date(y,m - 1,d);
				}

				bindUI() {
					$('prefBtn').onclick = ()=>$('prefDialog').showModal();
					$('closePref').onclick = ()=>$('prefDialog').close();
					$('savePrefBtn').onclick = ()=>{
						this.readFormFields();
						this.saveState();
						this.applyTheme(state.theme);
						this.updateLang(state.lang);
						this.render();
						$('prefDialog').close();
					}
					;
					$('resetPrefBtn').onclick = ()=>{
						this.resetState();
						$('prefDialog').close();
					}
					;
					$('myLocBtn').onclick = ()=>this.getLocation();
					$('todayBtn').onclick = ()=>{
						state.viewDate = new Date();
						this.setInput($('gDateInput'), state.viewDate);
						this.syncHijriInputs(state.viewDate);
						this.render();
					}
					;
					$('prevMonthBtn').onclick = ()=>this.navMonth(-1);
					$('nextMonthBtn').onclick = ()=>this.navMonth(1);

					const goG = ()=>{
						const d = this.getInput($('gDateInput'));
						if (d) {
							state.viewDate = d;
							this.syncHijriInputs(d);
							this.render();
						}
					}
					;
					$('gDateInput').addEventListener('change', goG);
					$('gDateInput').addEventListener('keydown', e=>e.key === 'Enter' && goG());

					const goH = ()=>{
						const d = parseInt($('hDayInput').value)
						  , m = parseInt($('hMonthInput').value)
						  , y = parseInt($('hYearInput').value);
						if (d && m && y) {
							const g = this.hijriToGregorian(y, m, d);
							state.viewDate = g;
							this.setInput($('gDateInput'), g);
							this.syncHijriInputs(g);
							this.render();
						}
					}
					;
					[$('hDayInput'), $('hMonthInput'), $('hYearInput')].forEach(el=>{
						el.addEventListener('change', goH);
						el.addEventListener('keydown', e=>e.key === 'Enter' && goH());
					}
					);
					$('hMonthInput').addEventListener('change', ()=>this.updateHDayLimit());
					$('hYearInput').addEventListener('input', ()=>this.updateHDayLimit());

					$('calendar').addEventListener('keydown', e=>{
						const cell = e.target.closest('.cell');
						if (!cell)
							return;
						if (e.key === 'Enter' || e.key === ' ') {
							e.preventDefault();
							cell.click();
							return;
						}
						const nav = {
							ArrowRight: 1,
							ArrowLeft: -1,
							ArrowUp: -7,
							ArrowDown: 7,
							Home: null,
							End: null,
							PageUp: null,
							PageDown: null
						};
						if (!(e.key in nav))
							return;
						e.preventDefault();
						const cells = [...$('calendar').querySelectorAll('.cell')];
						const i = cells.indexOf(cell);
						let ni = i;
						if (e.key === 'Home')
							ni = 0;
						else if (e.key === 'End')
							ni = cells.length - 1;
						else if (e.key === 'PageUp' || e.key === 'PageDown') {
							this.navMonth(e.key === 'PageDown' ? 1 : -1);
							return;
						} else
							ni += nav[e.key];
						if (ni >= 0 && ni < cells.length) {
							cell.tabIndex = -1;
							cells[ni].tabIndex = 0;
							cells[ni].focus();
						}
					}
					);

					T.en.months.forEach((m,i)=>{
						const o = document.createElement('option');
						o.value = i + 1;
						o.textContent = m;
						$('hMonthInput').appendChild(o);
					}
					);
					this.setInput($('gDateInput'), new Date());
					const h = this.gregorianToHijri(new Date());
					$('hDayInput').value = h.day;
					$('hMonthInput').value = h.month;
					$('hYearInput').value = h.year;
					this.updateHDayLimit();
				}

				syncFormFields() {
					$('latInput').value = state.lat;
					$('lonInput').value = state.lon;
					$('language').value = state.lang;
					$('weekStart').value = state.weekStart;
					$('hijriAdj').value = state.hijriAdj;
					$('primaryCalendar').value = state.primaryCalendar;
					$('theme').value = state.theme;
					$('calcMode').value = state.calcMode;
					$('gModeSelect').value = state.gMode;
					if (this.offline) {
						$('calcMode').value = 'linear';
						$('calcMode').disabled = true;
					}
				}
				readFormFields() {
					state.lat = parseFloat($('latInput').value);
					state.lon = parseFloat($('lonInput').value);
					state.lang = $('language').value;
					state.weekStart = parseInt($('weekStart').value);
					state.hijriAdj = parseInt($('hijriAdj').value);
					state.primaryCalendar = $('primaryCalendar').value;
					state.theme = $('theme').value;
					state.calcMode = $('calcMode').value;
					state.gMode = $('gModeSelect').value;
				}
				resetState() {
					state = {
						...state,
						lat: 6.075,
						lon: 95.1125,
						lang: navigator.language?.startsWith('id') ? 'id' : 'en',
						theme: 'auto',
						weekStart: 0,
						hijriAdj: 0,
						primaryCalendar: 'gregorian',
						calcMode: this.offline ? 'linear' : 'astronomic',
						gMode: 'transition'
					};
					this.syncFormFields();
					this.saveState();
					this.applyTheme(state.theme);
					this.updateLang(state.lang);
					this.render();
				}

				updateLang(lang) {
					const tr = T[lang];
					document.querySelectorAll('[data-i18n-aria]').forEach(el=>{
						const key = el.getAttribute('data-i18n-aria');
						if (tr[key])
							el.setAttribute('aria-label', tr[key]);
					}
					);
					document.title = tr.appTitle;
					$('appTitle').textContent = tr.appTitle;
					let sfx = '';
					if (this.offline)
						sfx = ' (Offline)';
					else if (state.calcMode === 'linear')
						sfx = tr.linearSuffix;
					else if (state.calcMode === 'tabular')
						sfx = tr.tabularSuffix;
					$('appSubtitle').textContent = this.fmtCoords(state.lat, state.lon) + sfx;
					$('navTitle').textContent = tr.navTitle;
					$('calTitle').textContent = tr.calTitle;
					$('gLbl').textContent = tr.gDateLabel;
					$('hLbl').textContent = tr.hDateLabel;
					$('prefTitle').textContent = tr.prefTitle;
					$('langLabel').textContent = tr.langLabel;
					$('themeLabel').textContent = tr.themeLabel;
					$('primaryCalLabel').textContent = tr.primaryCalLabel;
					$('weekStartLabel').textContent = tr.weekStartLabel;
					$('locLabel').textContent = tr.locLabel;
					$('latLabel').textContent = tr.latLabel;
					$('lonLabel').textContent = tr.lonLabel;
					$('adjLabel').textContent = tr.adjLabel;
					$('adjNote').textContent = tr.adjNote;
					$('hDayInput').placeholder = tr.hDay;
					$('hYearInput').placeholder = tr.hYear;
					$('myLocBtn').textContent = tr.myLoc;
					$('savePrefBtn').textContent = tr.save;
					$('resetPrefBtn').textContent = tr.reset;
					$('prefBtn').textContent = tr.prefBtn;
					this.updateHMonthTooltip();
					$('todayBtn').textContent = tr.today;
					$('prevMonthBtn').textContent = tr.prevBtn;
					$('nextMonthBtn').textContent = tr.nextBtn;
					$('formulaTitle').textContent = tr.formulaTitle;
					$('footerNote').textContent = tr.footer;
					$('calcModeLabel').textContent = tr.calcModeLabel;
					$('gModeLabel').textContent = tr.gModeLabel;
					[...$('hMonthInput').options].forEach((o,i)=>o.textContent = tr.months[i]);

					const tOpt = (sel, pfx) => [...$(sel).options].forEach(o => {
						const k = pfx + o.value.charAt(0).toUpperCase() + o.value.slice(1);
						if (tr[k]) o.textContent = tr[k];
					});
					tOpt('theme', 'theme');
					tOpt('primaryCalendar', 'cal');
					tOpt('gModeSelect', 'gMode');
					tOpt('calcMode', 'calcMode');

					[...$('weekStart').options].forEach(o => {
						const map = { '0': 'weekSun', '1': 'weekMon', '6': 'weekSat' };
						if (tr[map[o.value]]) o.textContent = tr[map[o.value]];
					});

					this.updateFormula(tr);
					this.render();
				}
				updateFormula(tr) {
					const mode = state.calcMode;
					if (mode === 'astronomic') {
						$('formulaDisplay').textContent = `${tr.criteria}:\n${tr.altitude} ≥ 3°\n${tr.elongation} ≥ 6.4°`;
						$('formulaNote').innerHTML = `<i>${tr.footer}</i>`;
						$('formulaDesc').textContent = tr.formulaDescMabbims;
					} else if (mode === 'linear') {
						$('formulaDisplay').textContent = `JD = 1948440 + floor(29.530573265·N + 0.236624) + Day − 1\nN = (Year−1)·12 + Month−1`;
						$('formulaNote').innerHTML = `<i>${tr.epoch}: 1 Muharram 1 AH = JD 1948440.</i>`;
						$('formulaDesc').textContent = tr.formulaDescLinear;
					} else {
						$('formulaDisplay').textContent = `JD = 1948440 + (Cycle·10631) + YearStarts[Y] + MonthOffsets[M] + Day − 1`;
						$('formulaNote').innerHTML = `<i>Fixed cycle. ${tr.leapYears}: 1, 2, 5, 7, 10, 13, 16, 18, 21, 24, 26 ${tr.ofCycle}.</i>`;
						$('formulaDesc').textContent = tr.formulaDescTabular;
					}
				}

				syncHijriInputs(date) {
					const h = this.gregorianToHijri(date);
					$('hDayInput').value = h.day;
					$('hMonthInput').value = String(h.month);
					$('hYearInput').value = h.year;
					this.updateHDayLimit();
					this.updateHMonthTooltip();
				}
				updateHMonthTooltip() {
					const m = parseInt($('hMonthInput').value);
					if (!isNaN(m))
						$('hMonthInput').title = T[state.lang].months[m - 1];
				}
				updateHDayLimit() {
					const m = parseInt($('hMonthInput').value)
					  , y = parseInt($('hYearInput').value);
					if (!isNaN(m) && !isNaN(y)) {
						this.updateHMonthTooltip();
						const s1 = this.getMonthStart(y, m);
						const {year: ny, month: nm} = this.addMonths(y, m, 1);
						const s2 = this.getMonthStart(ny, nm);
						const days = Math.round((s2.gDate - s1.gDate) / 86400000);
						$('hDayInput').max = days;
						$('hDayInput').placeholder = `1-${days}`;
						if (parseInt($('hDayInput').value) > days)
							$('hDayInput').value = days;
					}
				}

				getLocation() {
					const tr = T[state.lang]
					  , btn = $('myLocBtn');
					if (!navigator.geolocation)
						return alert(tr.geoNotSupported);
					btn.disabled = true;
					btn.innerHTML = `<span class="spinner"></span> ${tr.locating}`;
					navigator.geolocation.getCurrentPosition(p=>{
						$('latInput').value = p.coords.latitude.toFixed(4);
						$('lonInput').value = p.coords.longitude.toFixed(4);
						btn.disabled = false;
						btn.textContent = tr.myLoc;
					}
					, err=>{
						alert(tr.errorLocation + err.message);
						btn.disabled = false;
						btn.textContent = tr.myLoc;
					}
					);
				}

				addMonths(y, m, d) {
					const x = m - 1 + d;
					return {
						year: y + Math.floor(x / 12),
						month: ((x % 12) + 12) % 12 + 1
					};
				}
				tzOff() {
					return Math.round(state.lon / 15);
				}

				jdToDate(jd) {
					const Z = Math.floor(jd + .5)
					  , F = jd + .5 - Z;
					let A = Z;
					if (state.gMode === 'proleptic' || Z >= 2299161) {
						const a = Math.floor((Z - 1867216.25) / 36524.25);
						A = Z + 1 + a - Math.floor(a / 4);
					}
					const B = A + 1524
					  , C = Math.floor((B - 122.1) / 365.25)
					  , D = Math.floor(365.25 * C)
					  , E = Math.floor((B - D) / 30.6001);
					const day = B - D - Math.floor(30.6001 * E) + F
					  , month = E < 14 ? E - 1 : E - 13
					  , year = month > 2 ? C - 4716 : C - 4715;
					const d = new Date(0);
					d.setFullYear(year, month - 1, Math.floor(day));
					return d;
				}
				dateToJD(date) {
					let Y = date.getFullYear()
					  , M = date.getMonth() + 1
					  , D = date.getDate()
					  , B = 0;
					if (M <= 2) {
						Y--;
						M += 12;
					}
					if (state.gMode === 'proleptic' || Y > 1582 || (Y === 1582 && (M > 10 || (M === 10 && D >= 15)))) {
						const A = Math.floor(Y / 100);
						B = 2 - A + Math.floor(A / 4);
					}
					return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + D + B - 1524;
				}
				getDOW(jd) {
					return (Math.floor(jd + 1.5) % 7);
				}

				linMonthStartJD(idx) {
					if (state.calcMode === 'tabular') {
						const cyc = Math.floor(idx / 360)
						  , ic = ((idx % 360) + 360) % 360
						  , yc = Math.floor(ic / 12)
						  , mc = ic % 12;
						const leaps = [1, 2, 5, 7, 10, 13, 16, 18, 21, 24, 26];
						return 1948440 + cyc * 10631 + yc * 354 + leaps.filter(l=>l <= yc).length + Math.ceil(mc * 29.5);
					}
					return 1948440 + Math.floor(29.530573265 * idx + 0.236624);
				}
				linIdxFromJD(jd) {
					if (state.calcMode === 'tabular') {
						let i = Math.round((jd - 1948440) / 29.530555);
						while (this.linMonthStartJD(i + 1) <= jd)
							i++;
						while (this.linMonthStartJD(i) > jd)
							i--;
						return i;
					}
					return Math.floor((jd - 1948440 + 0.763376) / 29.530573265);
				}

				hijriToGregorianLinear(hy, hm, hd) {
					const idx = (hy - 1) * 12 + hm - 1;
					return this.jdToDate(this.linMonthStartJD(idx) + hd - 1 + state.hijriAdj);
				}
				hijriToGregorian(hy, hm, hd) {
					if (this.offline || state.calcMode !== 'astronomic')
						return this.hijriToGregorianLinear(hy, hm, hd);
					const s = this.getMonthStart(hy, hm);
					const g = new Date(s.gDate);
					g.setDate(g.getDate() + (hd - 1));
					return g;
				}

				gregorianToHijriLinear(date) {
					let jd = this.dateToJD(date) - state.hijriAdj;
					const idx = this.linIdxFromJD(jd);
					const d = jd - this.linMonthStartJD(idx) + 1;
					let hm = (idx % 12);
					if (hm < 0)
						hm += 12;
					return {
						day: d,
						month: hm + 1,
						year: Math.floor(idx / 12) + 1
					};
				}
				gregorianToHijri(date) {
					if (this.offline || state.calcMode !== 'astronomic')
						return this.gregorianToHijriLinear(date);
					const approx = this.gregorianToHijriLinear(date);
					const sc = this.getMonthStart(approx.year, approx.month);
					const dt = date.getTime()
					  , st = sc.gDate.getTime();
					if (dt < st) {
						const {year: py, month: pm} = this.addMonths(approx.year, approx.month, -1);
						const sp = this.getMonthStart(py, pm);
						return {
							day: Math.round((dt - sp.gDate.getTime()) / 86400000) + 1,
							month: pm,
							year: py
						};
					}
					const {year: ny, month: nm} = this.addMonths(approx.year, approx.month, 1);
					const sn = this.getMonthStart(ny, nm);
					if (dt >= sn.gDate.getTime())
						return {
							day: Math.round((dt - sn.gDate.getTime()) / 86400000) + 1,
							month: nm,
							year: ny
						};
					return {
						day: Math.round((dt - st) / 86400000) + 1,
						month: approx.month,
						year: approx.year
					};
				}

				checkVisibility(dateObj, nmUT) {
					const date = Astronomy.MakeTime(dateObj)
					  , obs = new Astronomy.Observer(state.lat,state.lon,0);
					const ss = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, -1, date.ut, 1);
					if (!ss)
						return false;
					let nm = nmUT;
					if (nm == null) {
						const b = Astronomy.SearchMoonPhase(0, date.ut, -35);
						if (!b)
							return false;
						nm = b.ut;
					}
					if (ss.ut - nm < 0)
						return false;
					const me = Astronomy.Equator(Astronomy.Body.Moon, ss.ut, obs, true, true);
					const mh = Astronomy.Horizon(ss.ut, obs, me.ra, me.dec, 'normal');
					const se = Astronomy.Equator(Astronomy.Body.Sun, ss.ut, obs, true, true);
					return (mh.altitude >= 3 && Astronomy.AngleBetween(se.vec, me.vec) >= 6.4);
				}

				getMonthStart(hy, hm) {
					if (this.offline || state.calcMode !== 'astronomic' || hy < 1300)
						return {
							gDate: this.hijriToGregorianLinear(hy, hm, 1)
						};
					if (!this.cache)
						this.loadCache();
					const k = `${hy}-${hm}-${state.lat}-${state.lon}-${state.gMode}`;
					if (this.cache[k]) {
						if (typeof this.cache[k].gDate === 'string')
							this.cache[k].gDate = new Date(this.cache[k].gDate);
						return this.cache[k];
					}
					const anchor = new Date('2023-07-19T12:00:00Z')
					  , days = ((hy - 1445) * 354.367) + ((hm - 1) * 29.53);
					const approx = new Date(anchor.getTime() + days * 86400000);
					const t = Astronomy.MakeTime(new Date(approx.getTime() - 5 * 86400000));
					const nm = Astronomy.SearchMoonPhase(0, t.ut, 10);
					if (!nm || Math.abs(nm.date - approx) > 4 * 86400000)
						return {
							gDate: approx
						};
					const tz = this.tzOff()
					  , lt = new Date(nm.date.getTime() + tz * 3600000);
					const y = lt.getUTCFullYear()
					  , m = lt.getUTCMonth()
					  , d = lt.getUTCDate();
					const vis = this.checkVisibility(new Date(Date.UTC(y, m, d, 12 - tz, 0, 0)), nm.ut);
					const res = {
						gDate: new Date(y,m,d + (vis ? 1 : 2))
					};
					this.cache[k] = res;
					this.schedSaveCache();
					return res;
				}

				navMonth(delta) {
					if (state.primaryCalendar === 'hijri') {
						const h = this.gregorianToHijri(state.viewDate);
						const {year: ny, month: nm} = this.addMonths(h.year, h.month, delta);
						const s = this.getMonthStart(ny, nm);
						state.viewDate = new Date(s.gDate.getTime() + 15 * 86400000);
					} else {
						const d = state.viewDate.getDate();
						state.viewDate.setDate(1);
						state.viewDate.setMonth(state.viewDate.getMonth() + delta);
						const max = new Date(state.viewDate.getFullYear(),state.viewDate.getMonth() + 1,0).getDate();
						state.viewDate.setDate(Math.min(d, max));
					}
					this.render();
				}

				render() {
					const tr = T[state.lang]
					  , grid = $('calendar');
					const isG = state.primaryCalendar !== 'hijri';
					if (isG) {
						const y = state.viewDate.getFullYear()
						  , m = state.viewDate.getMonth();
						$('monthDisplay').textContent = state.viewDate.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', {
							month: 'long',
							year: 'numeric'
						});
						const hS = this.gregorianToHijri(new Date(y,m,1))
						  , hE = this.gregorianToHijri(new Date(y,m + 1,0));
						$('hijriRangeDisplay').textContent = `${tr.months[hS.month - 1]} ${hS.year} – ${tr.months[hE.month - 1]} ${hE.year}`;
						const fjd = this.dateToJD(new Date(y,m,1));
						let off = this.getDOW(fjd) - state.weekStart;
						if (off < 0)
							off += 7;
						this.buildGrid(fjd - off, true, {
							month: m,
							year: y
						});
					} else {
						const h = this.gregorianToHijri(state.viewDate);
						const cs = this.getMonthStart(h.year, h.month);
						const {year: ny, month: nm} = this.addMonths(h.year, h.month, 1);
						const ns = this.getMonthStart(ny, nm);
						$('monthDisplay').textContent = `${tr.months[h.month - 1]} ${h.year}`;
						const gS = cs.gDate
						  , gE = new Date(ns.gDate.getTime() - 86400000);
						$('hijriRangeDisplay').textContent = `${gS.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', {
							month: 'short',
							year: 'numeric'
						})} – ${gE.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', {
							month: 'short',
							year: 'numeric'
						})}`;
						const sjd = this.dateToJD(cs.gDate);
						let off = this.getDOW(sjd) - state.weekStart;
						if (off < 0)
							off += 7;
						this.buildGrid(sjd - off, false, {
							hMonth: h.month,
							hYear: h.year,
							startJD: sjd,
							endJD: this.dateToJD(ns.gDate)
						});
					}
				}

				buildGrid(startJD, isG, ctx) {
					const tr = T[state.lang]
					  , grid = $('calendar')
					  , frag = document.createDocumentFragment();
					grid.innerHTML = '';
					for (let i = 0; i < 7; i++) {
						const di = (state.weekStart + i) % 7;
						const h = document.createElement('div');
						h.className = 'day-hdr' + (di === 5 ? ' fri' : '');
						h.setAttribute('role', 'columnheader');
						h.textContent = tr.days[di];
						frag.appendChild(h);
					}
					let hStarts = [];
					if (isG) {
						const sh = this.gregorianToHijri(this.jdToDate(startJD));
						for (let i = -1; i <= 3; i++) {
							const {year, month} = this.addMonths(sh.year, sh.month, i);
							const s = this.getMonthStart(year, month);
							hStarts.push({
								year,
								month,
								jd: this.dateToJD(s.gDate)
							});
						}
						hStarts.sort((a,b)=>a.jd - b.jd);
					}
					const todayJD = this.dateToJD(new Date());
					const selDate = this.getInput($('gDateInput'));
					const selJD = selDate ? this.dateToJD(selDate) : -1;

					for (let i = 0; i < 42; i++) {
						const jd = startJD + i;
						const date = this.jdToDate(jd);
						const hi = this.getHijriCell(jd, isG, ctx, hStarts);
						const isJul = (state.gMode === 'transition' && jd < 2299161);
						const isOther = isG ? (date.getMonth() !== ctx.month) : (jd < ctx.startJD || jd >= ctx.endJD);
						const isToday = (jd === todayJD)
						  , isSel = (jd === selJD)
						  , isFri = (this.getDOW(jd) === 5);

						const cell = document.createElement('div');
						cell.className = 'cell' + (isFri ? ' fri-cell' : '') + (isOther ? ' other' : '') + (isToday ? ' today' : '') + (isSel ? ' sel' : '');
						cell.setAttribute('role', 'gridcell');
						cell.tabIndex = -1;
						if (isToday)
							cell.setAttribute('aria-current', 'date');
						if (isSel)
							cell.setAttribute('aria-selected', 'true');
						cell.dataset.date = `${String(date.getFullYear()).padStart(4, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

						const isGmode = state.primaryCalendar !== 'hijri';
						const pv = isGmode ? date.getDate() : hi.day
						  , sv = isGmode ? hi.day : date.getDate();
						const isNewH = (hi.day === 1)
						  , isNewG = (date.getDate() === 1);
						const isNewSec = isGmode ? isNewH : isNewG;
						const showSecMon = (i === 0) || isNewSec;
						const julTag = `<sup class="jul-lbl">${tr.julian}</sup>`;
						const secMon = showSecMon ? ` ${isGmode ? hi.mn : date.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', {
							month: 'short'
						})}` : '';

						cell.innerHTML = `<div class="pdate">${pv}${isGmode && isJul ? julTag : ''}</div><div class="sdate${isNewSec ? ' new-m' : ''}">${sv}${!isGmode && isJul ? julTag : ''}${secMon}</div>`;
						cell.onclick = ()=>{
							state.viewDate = date;
							this.setInput($('gDateInput'), date);
							this.syncHijriInputs(date);
							this.render();
							$('calendar').querySelector('.cell.sel')?.focus();
						}
						;
						cell.setAttribute('aria-label', `${date.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-US', {
							weekday: 'long',
							year: 'numeric',
							month: 'long',
							day: 'numeric'
						})}, ${hi.day} ${hi.mf}`);
						frag.appendChild(cell);
					}
					grid.appendChild(frag);
					const fc = grid.querySelector('.cell.sel') || grid.querySelector('.cell.today') || grid.querySelector('.cell');
					if (fc)
						fc.tabIndex = 0;
				}

				getHijriCell(jd, isG, ctx, hStarts) {
					const tr = T[state.lang];
					if (isG) {
						for (let k = 0; k < hStarts.length - 1; k++) {
							if (jd >= hStarts[k].jd && jd < hStarts[k + 1].jd) {
								const mi = hStarts[k].month - 1;
								return {
									day: Math.round(jd - hStarts[k].jd) + 1,
									mf: tr.months[mi],
									mn: tr.monthsShort[mi]
								};
							}
						}
						return {
							day: '',
							mf: '',
							mn: ''
						};
					}
					let hjd, hm;
					if (jd >= ctx.startJD && jd < ctx.endJD) {
						hjd = ctx.startJD;
						hm = ctx.hMonth;
					} else if (jd < ctx.startJD) {
						const {year: py, month: pm} = this.addMonths(ctx.hYear, ctx.hMonth, -1);
						hjd = this.dateToJD(this.getMonthStart(py, pm).gDate);
						hm = pm;
					} else {
						const {year: ny, month: nm} = this.addMonths(ctx.hYear, ctx.hMonth, 1);
						hjd = this.dateToJD(this.getMonthStart(ny, nm).gDate);
						hm = nm;
					}
					return {
						day: Math.round(jd - hjd) + 1,
						mf: tr.months[hm - 1],
						mn: tr.monthsShort[hm - 1]
					};
				}
			}
			new HijriCalc();
		</script>
	</body>
</html>
