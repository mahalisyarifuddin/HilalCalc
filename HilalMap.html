<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>HilalMap - New Moon Visibility Map</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        :root {
            --primary: #2563eb; --on-primary: #ffffff; --hover: #1d4ed8; --background: #f8fafc; --surface: #ffffff; --text: #1e293b; --border: #e2e8f0; --muted: #f1f5f9; --success: #059669; --error: #dc2626; --highlight-bg: #dbeafe;
        }
        @media (prefers-color-scheme: dark) {
            :root:not(.light) {
                --primary: #60a5fa; --on-primary: #0f172a; --hover: #93c5fd; --background: #0f172a; --surface: #1e293b; --text: #f1f5f9; --border: #334155; --muted: #334155; --success: #34d399; --error: #f87171; --highlight-bg: #1e3a8a;
            }
        }
        :root.dark {
            --primary: #60a5fa; --on-primary: #0f172a; --hover: #93c5fd; --background: #0f172a; --surface: #1e293b; --text: #f1f5f9; --border: #334155; --muted: #334155; --success: #34d399; --error: #f87171; --highlight-bg: #1e3a8a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline-offset: 2px; }
        body { background: var(--background); color: var(--text); font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .controls { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
        select, input, button { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; padding: 0.5rem; }
        button { cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .primary { background: var(--primary); color: var(--on-primary); border: 0; padding-left: 1.5rem; padding-right: 1.5rem; }
        .primary:hover { background: var(--hover); }
        .main-container { flex: 1; display: grid; grid-template-columns: 1fr 320px; overflow: hidden; }
        .map-container { position: relative; background: #9bbff4; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #visibilityCanvas { width: 100%; height: auto; display: block; background-size: contain; background-repeat: no-repeat; cursor: crosshair; image-rendering: -webkit-optimize-contrast; }
        .sidebar { background: var(--surface); border-left: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
        .status-box { padding: 1.25rem; border-radius: 12px; border: 2px solid var(--border); display: flex; flex-direction: column; gap: 0.5rem; }
        .status-yes { border-color: var(--success); background: rgba(5, 150, 105, 0.05); }
        .status-no { border-color: var(--error); background: rgba(220, 38, 38, 0.05); }
        .status-label { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-value { font-size: 1.5rem; font-weight: 800; line-height: 1.2; }
        .detail-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
        .detail-row:last-child { border: 0; }
        .criteria-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-top: 4px; }
        .pill-mabbims { background: var(--highlight-bg); color: var(--primary); }
        .pill-gic { background: #fee2e2; color: #b91c1c; }
        .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); display: none; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .loading-overlay.active { display: flex; }
        .spinner { width: 2.5rem; height: 2.5rem; border: 4px solid var(--surface); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } .sidebar { border-left: 0; border-top: 1px solid var(--border); } }
        .nav-group { display: flex; gap: 4px; }
    </style>
</head>
<body>
    <header>
        <h1 style="font-size: 1.25rem;" id="applicationTitle">HilalMap</h1>
        <div class="controls">
            <div class="nav-group">
                <button id="previousMonthButton">&laquo;</button>
                <input type="number" id="hijriYearInput" style="width: 70px;">
                <select id="hijriMonthInput">
                    <option value="1">Muharram</option><option value="2">Safar</option><option value="3">Rabi'ul Awal</option><option value="4">Rabi'ul Akhir</option><option value="5">Jumadil Ula</option><option value="6">Jumadil Akhira</option><option value="7">Rajab</option><option value="8">Sya'ban</option><option value="9">Ramadan</option><option value="10">Syawal</option><option value="11">Zulkaidah</option><option value="12">Zulhijah</option>
                </select>
                <button id="nextMonthButton">&raquo;</button>
            </div>
            <button id="calculateButton" class="primary">Calculate</button>
            <select id="languageSelector"><option value="en">English</option><option value="id">Indonesia</option></select>
        </div>
    </header>
    <div class="main-container">
        <div class="map-container">
            <div id="loaderOverlay" class="loading-overlay"><div class="spinner"></div></div>
            <canvas id="visibilityCanvas" width="2048" height="1024"></canvas>
        </div>
        <div class="sidebar">
            <div id="mabbimsStatusBox" class="status-box">
                <div class="status-label">MABBIMS [Indonesia]</div>
                <div id="mabbimsVerdictDisplay" class="status-value">...</div>
                <div class="criteria-pill pill-mabbims">Alt ≥ 3°, Elong ≥ 6.4°</div>
            </div>
            <div id="gicStatusBox" class="status-box">
                <div class="status-label">GIC [Global]</div>
                <div id="gicVerdictDisplay" class="status-value">...</div>
                <div class="criteria-pill pill-gic">Alt (Geo) ≥ 5°, Elong ≥ 8°</div>
            </div>
            <div class="details">
                <div style="font-weight:700; margin-bottom:0.5rem; color:var(--primary)" id="pointDetailsTitle">Point Details</div>
                <div class="detail-row"><span id="latitudeLabel">Latitude</span><span id="latitudeValue">0.00°</span></div>
                <div class="detail-row"><span id="longitudeLabel">Longitude</span><span id="longitudeValue">0.00°</span></div>
                <div class="detail-row"><span id="sunsetLabel">Sunset (UTC)</span><span id="sunsetValue">--:--</span></div>
                <div class="detail-row"><span id="altitudeLabel">Altitude</span><span id="altitudeValue">0.00°</span></div>
                <div class="detail-row"><span id="elongationLabel">Elongation</span><span id="elongationValue">0.00°</span></div>
            </div>
            <div class="details">
                <div style="font-weight:700; margin-bottom:0.5rem;" id="conjunctionInfoTitle">Conjunction Info</div>
                <div class="detail-row"><span id="ijtimaLabel">Ijtima (UTC)</span><span id="ijtimaValue">--:--</span></div>
                <div class="detail-row"><span id="mapDateLabel">Map Date</span><span id="mapDateValue">--</span></div>
            </div>
        </div>
    </div>
    <script>
        const TRANSLATIONS = {
            en: {
                appTitle: "HilalMap", calc: "Calculate", pointDetails: "Point Details", info: "Conjunction Info",
                verdictYes: "VISIBLE", verdictNo: "NOT VISIBLE", lat: "Latitude", lon: "Longitude", sunset: "Sunset (UTC)", altitude: "Altitude", elongation: "Elongation", ijtima: "Ijtima (UTC)", mapDate: "Map Date",
                months: ["Muharram", "Safar", "Rabi'ul Awal", "Rabi'ul Akhir", "Jumadil Ula", "Jumadil Akhira", "Rajab", "Sya'ban", "Ramadan", "Syawal", "Zulkaidah", "Zulhijah"]
            },
            id: {
                appTitle: "HilalMap", calc: "Hitung", pointDetails: "Detail Titik", info: "Informasi Ijtima",
                verdictYes: "TERLIHAT", verdictNo: "TIDAK TERLIHAT", lat: "Lintang", lon: "Bujur", sunset: "Maghrib (UTC)", altitude: "Tinggi", elongation: "Elongasi", ijtima: "Ijtima (UTC)", mapDate: "Tanggal Peta",
                months: ["Muharram", "Safar", "Rabi'ul Awal", "Rabi'ul Akhir", "Jumadil Ula", "Jumadil Akhira", "Rajab", "Sya'ban", "Ramadan", "Syawal", "Zulkaidah", "Zulhijah"]
            }
        };

        const WORKER_CODE = `
            importScripts("https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js");

            function getEclipticElongation(universalTime) {
                const moonGeocentricVector = Astronomy.GeoVector(Astronomy.Body.Moon, universalTime, true);
                const sunGeocentricVector = Astronomy.GeoVector(Astronomy.Body.Sun, universalTime, true);
                const moonEcliptic = Astronomy.Ecliptic(moonGeocentricVector);
                const sunEcliptic = Astronomy.Ecliptic(sunGeocentricVector);
                return (moonEcliptic.elon - sunEcliptic.elon + 360) % 360;
            }

            function calculateGeocentricAltitude(universalTime, observer, moonGeocentricVector) {
                const observerVector = Astronomy.ObserverVector(universalTime, observer, true);
                const dotProduct = observerVector.x * moonGeocentricVector.x + observerVector.y * moonGeocentricVector.y + observerVector.z * moonGeocentricVector.z;
                const observerMagnitude = Math.sqrt(observerVector.x**2 + observerVector.y**2 + observerVector.z**2);
                const moonMagnitude = Math.sqrt(moonGeocentricVector.x**2 + moonGeocentricVector.y**2 + moonGeocentricVector.z**2);
                return 90.0 - Math.acos(Math.max(-1, Math.min(1, dotProduct / (observerMagnitude * moonMagnitude)))) * 180.0 / Math.PI;
            }

            self.onmessage = function(event) {
                const { year, month, offset } = event.data;
                const observerNewZealand = new Astronomy.Observer(-41.28, 174.77, 0);

                let currentMabbimsJulianDate = 2460144.5; // 1 Muharram 1445
                let monthIndex = (1445 - 1) * 12;
                const targetIndex = (year - 1) * 12 + (month - 1);

                if (targetIndex < monthIndex) { currentMabbimsJulianDate = 1948439.5; monthIndex = 0; }

                while (monthIndex < targetIndex) {
                    const conjunctionSearchTime = Astronomy.MakeTime(new Date((currentMabbimsJulianDate - 2440587.5 + 20) * 86400000));
                    const conjunction = Astronomy.SearchMoonPhase(0, conjunctionSearchTime, 40);
                    let day29JulianDate = currentMabbimsJulianDate + 28;
                    const fajrNewZealand = Astronomy.SearchAltitude(Astronomy.Body.Sun, observerNewZealand, 1, Astronomy.MakeTime(new Date((day29JulianDate - 2440587.5 - 0.5) * 86400000)), 2.0, -18.0);

                    let isMabbimsMatch = false;
                    if (conjunction.ut <= fajrNewZealand.ut - 0.0001) {
                        for (let longitude = 141; longitude >= 95; longitude -= 5) {
                            for (let latitude = -11; latitude <= 7; latitude += 5) {
                                const observer = new Astronomy.Observer(latitude, longitude, 0);
                                const sunsetTime = Astronomy.SearchRiseSet(Astronomy.Body.Sun, observer, -1, Astronomy.MakeTime(new Date((day29JulianDate - 2440587.5 - longitude/360) * 86400000)), 1.0);
                                if (sunsetTime && sunsetTime.ut >= conjunction.ut - 0.0001) {
                                    const eclipticElongation = getEclipticElongation(sunsetTime.ut);
                                    const moonEquator = Astronomy.Equator(Astronomy.Body.Moon, sunsetTime.ut, observer, true, true);
                                    const topocentricAltitude = Astronomy.Horizon(sunsetTime.ut, observer, moonEquator.ra, moonEquator.dec, "normal").altitude;
                                    if (topocentricAltitude >= 3.0 && eclipticElongation >= 6.4) { isMabbimsMatch = true; break; }
                                }
                            }
                            if (isMabbimsMatch) break;
                        }
                    }
                    currentMabbimsJulianDate = day29JulianDate + (isMabbimsMatch ? 1 : 2) - 0.5;
                    monthIndex++;
                }

                const finalConjunctionSearchTime = Astronomy.MakeTime(new Date((currentMabbimsJulianDate - 2440587.5 - 10) * 86400000));
                const finalConjunction = Astronomy.SearchMoonPhase(0, finalConjunctionSearchTime, 40);
                const mapJulianDate = currentMabbimsJulianDate - 1;

                const gridHeight = 100, gridWidth = 200;
                const visibilityGrid = new Int8Array(gridWidth * gridHeight);
                const nextFajrNewZealand = Astronomy.SearchAltitude(Astronomy.Body.Sun, observerNewZealand, 1, Astronomy.MakeTime(new Date((mapJulianDate - 2440587.5 + 0.5) * 86400000)), 2.0, -18.0);
                const midnightUniversalTime = mapJulianDate - 2451545.0;

                for (let j = 0; j < gridHeight; j++) {
                    const latitude = 90 - (j * 180 / gridHeight);
                    for (let i = 0; i < gridWidth; i++) {
                        const longitude = -180 + (i * 360 / gridWidth);
                        const observer = new Astronomy.Observer(latitude, longitude, 0);
                        const sunsetTime = Astronomy.SearchRiseSet(Astronomy.Body.Sun, observer, -1, Astronomy.MakeTime(new Date((mapJulianDate - 2440587.5 - longitude/360) * 86400000)), 1.0);

                        let visibilityStatus = 0;
                        if (sunsetTime && sunsetTime.ut >= finalConjunction.ut - 0.0001) {
                            const eclipticElongation = getEclipticElongation(sunsetTime.ut);
                            const geocentricAltitude = calculateGeocentricAltitude(sunsetTime.ut, observer, Astronomy.GeoVector(Astronomy.Body.Moon, sunsetTime.ut, true));
                            const moonEquator = Astronomy.Equator(Astronomy.Body.Moon, sunsetTime.ut, observer, true, true);
                            const topocentricAltitude = Astronomy.Horizon(sunsetTime.ut, observer, moonEquator.ra, moonEquator.dec, "normal").altitude;

                            const isGicVisible = geocentricAltitude >= 5.0 && eclipticElongation >= 8.0 && (sunsetTime.ut <= midnightUniversalTime + 0.0001 || (longitude <= -30 && sunsetTime.ut < nextFajrNewZealand.ut));
                            const isMabbimsVisible = topocentricAltitude >= 3.0 && eclipticElongation >= 6.4;

                            if (isGicVisible && isMabbimsVisible) visibilityStatus = 3;
                            else if (isGicVisible) visibilityStatus = 2;
                            else if (isMabbimsVisible) visibilityStatus = 1;
                        }
                        visibilityGrid[j * gridWidth + i] = visibilityStatus;
                    }
                }
                self.postMessage({ mapJulianDate, conjunctionUniversalTime: finalConjunction.ut, visibilityGrid, gridWidth, gridHeight });
            };
        `;

        const APPLICATION_STATE = { year: 1447, month: 1, language: 'en', mapJulianDate: 0, conjunctionUniversalTime: 0, grid: null, gridWidth: 0, gridHeight: 0 };
        const UI_ELEMENTS = {
            hijriYearInput: document.getElementById('hijriYearInput'), hijriMonthInput: document.getElementById('hijriMonthInput'), calculateButton: document.getElementById('calculateButton'),
            previousMonthButton: document.getElementById('previousMonthButton'), nextMonthButton: document.getElementById('nextMonthButton'), languageSelector: document.getElementById('languageSelector'),
            loaderOverlay: document.getElementById('loaderOverlay'), canvas: document.getElementById('visibilityCanvas'),
            mabbimsVerdictDisplay: document.getElementById('mabbimsVerdictDisplay'), gicVerdictDisplay: document.getElementById('gicVerdictDisplay'),
            mabbimsStatusBox: document.getElementById('mabbimsStatusBox'), gicStatusBox: document.getElementById('gicStatusBox'),
            latitudeValue: document.getElementById('latitudeValue'), longitudeValue: document.getElementById('longitudeValue'), sunsetValue: document.getElementById('sunsetValue'),
            altitudeValue: document.getElementById('altitudeValue'), elongationValue: document.getElementById('elongationValue'), ijtimaValue: document.getElementById('ijtimaValue'), mapDateValue: document.getElementById('mapDateValue')
        };
        const canvasContext = UI_ELEMENTS.canvas.getContext('2d');
        const worldMapImage = new Image();
        worldMapImage.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Equirectangular-projection.jpg/2048px-Equirectangular-projection.jpg';
        worldMapImage.onload = () => drawVisibilityMap();

        function updateLocalization() {
            APPLICATION_STATE.language = UI_ELEMENTS.languageSelector.value; const translations = TRANSLATIONS[APPLICATION_STATE.language];
            document.getElementById('applicationTitle').textContent = translations.appTitle;
            UI_ELEMENTS.calculateButton.textContent = translations.calc;
            document.getElementById('pointDetailsTitle').textContent = translations.pointDetails;
            document.getElementById('conjunctionInfoTitle').textContent = translations.info;
            document.getElementById('latitudeLabel').textContent = translations.lat;
            document.getElementById('longitudeLabel').textContent = translations.lon;
            document.getElementById('sunsetLabel').textContent = translations.sunset;
            document.getElementById('altitudeLabel').textContent = translations.altitude;
            document.getElementById('elongationLabel').textContent = translations.elongation;
            document.getElementById('ijtimaLabel').textContent = translations.ijtima;
            document.getElementById('mapDateLabel').textContent = translations.mapDate;
            for (let i = 0; i < 12; i++) UI_ELEMENTS.hijriMonthInput.options[i].textContent = translations.months[i];
            updateInfoLabels();
        }

        function drawVisibilityMap() {
            canvasContext.clearRect(0, 0, UI_ELEMENTS.canvas.width, UI_ELEMENTS.canvas.height);
            canvasContext.globalAlpha = 0.7; canvasContext.drawImage(worldMapImage, 0, 0, 2048, 1024);
            if (!APPLICATION_STATE.grid) return;
            canvasContext.globalAlpha = 0.4;
            const cellWidth = 2048 / APPLICATION_STATE.gridWidth, cellHeight = 1024 / APPLICATION_STATE.gridHeight;
            for (let j = 0; j < APPLICATION_STATE.gridHeight; j++) {
                for (let i = 0; i < APPLICATION_STATE.gridWidth; i++) {
                    const status = APPLICATION_STATE.grid[j * APPLICATION_STATE.gridWidth + i];
                    if (status === 0) continue;
                    canvasContext.fillStyle = (status === 1) ? '#3b82f6' : (status === 2 ? '#ef4444' : '#10b981');
                    canvasContext.fillRect(i * cellWidth, j * cellHeight, cellWidth, cellHeight);
                }
            }
        }

        function startVisibilityCalculation() {
            APPLICATION_STATE.year = parseInt(UI_ELEMENTS.hijriYearInput.value); APPLICATION_STATE.month = parseInt(UI_ELEMENTS.hijriMonthInput.value);
            UI_ELEMENTS.loaderOverlay.classList.add('active'); UI_ELEMENTS.calculateButton.disabled = true;
            const workerBlob = new Blob([WORKER_CODE], { type: 'application/javascript' });
            const worker = new Worker(URL.createObjectURL(workerBlob));
            worker.onmessage = (event) => {
                const { mapJulianDate, conjunctionUniversalTime, visibilityGrid, gridWidth, gridHeight } = event.data;
                APPLICATION_STATE.mapJulianDate = mapJulianDate; APPLICATION_STATE.conjunctionUniversalTime = conjunctionUniversalTime; APPLICATION_STATE.grid = visibilityGrid; APPLICATION_STATE.gridWidth = gridWidth; APPLICATION_STATE.gridHeight = gridHeight;
                UI_ELEMENTS.loaderOverlay.classList.remove('active'); UI_ELEMENTS.calculateButton.disabled = false;
                updateInfoLabels(); drawVisibilityMap(); verifyIndonesiaVisibility();
            };
            worker.postMessage({ year: APPLICATION_STATE.year, month: APPLICATION_STATE.month, offset: 2451545.0 });
        }

        function updateInfoLabels() {
            const translations = TRANSLATIONS[APPLICATION_STATE.language];
            UI_ELEMENTS.ijtimaValue.textContent = new Date((APPLICATION_STATE.conjunctionUniversalTime + 2451545.0 - 2440587.5) * 86400000).toISOString().substring(11, 16);
            UI_ELEMENTS.mapDateValue.textContent = new Date((APPLICATION_STATE.mapJulianDate - 2440587.5 + 0.5) * 86400000).toLocaleDateString(APPLICATION_STATE.language === 'id' ? 'id-ID' : 'en-GB', { day:'numeric', month:'short', year:'numeric' });
        }

        function verifyIndonesiaVisibility() {
            const translations = TRANSLATIONS[APPLICATION_STATE.language];
            let isMabbimsMatch = false;
            const startIndexI = Math.floor((95 + 180) * APPLICATION_STATE.gridWidth / 360), endIndexI = Math.ceil((141 + 180) * APPLICATION_STATE.gridWidth / 360);
            const startIndexJ = Math.floor((90 - 7) * APPLICATION_STATE.gridHeight / 180), endIndexJ = Math.ceil((90 + 11) * APPLICATION_STATE.gridHeight / 180);
            for (let j = startIndexJ; j <= endIndexJ; j++) {
                for (let i = startIndexI; i <= endIndexI; i++) {
                    const status = APPLICATION_STATE.grid[j * APPLICATION_STATE.gridWidth + i];
                    if (status === 1 || status === 3) { isMabbimsMatch = true; break; }
                }
                if (isMabbimsMatch) break;
            }
            UI_ELEMENTS.mabbimsVerdictDisplay.textContent = isMabbimsMatch ? translations.verdictYes : translations.verdictNo;
            UI_ELEMENTS.mabbimsStatusBox.className = 'status-box status-' + (isMabbimsMatch ? 'yes' : 'no');

            let isGicMatch = false;
            for (let k = 0; k < APPLICATION_STATE.grid.length; k++) { if (APPLICATION_STATE.grid[k] >= 2) { isGicMatch = true; break; } }
            UI_ELEMENTS.gicVerdictDisplay.textContent = isGicMatch ? translations.verdictYes : translations.verdictNo;
            UI_ELEMENTS.gicStatusBox.className = 'status-box status-' + (isGicMatch ? 'yes' : 'no');
        }

        UI_ELEMENTS.canvas.onmousemove = (event) => {
            const rect = UI_ELEMENTS.canvas.getBoundingClientRect();
            const mouseX = (event.clientX - rect.left) / rect.width * 2048, mouseY = (event.clientY - rect.top) / rect.height * 1024;
            const longitude = -180 + mouseX * 360 / 2048, latitude = 90 - mouseY * 180 / 1024;
            UI_ELEMENTS.latitudeValue.textContent = latitude.toFixed(2) + '°'; UI_ELEMENTS.longitudeValue.textContent = longitude.toFixed(2) + '°';

            const observer = new Astronomy.Observer(latitude, longitude, 0);
            const sunsetTime = Astronomy.SearchRiseSet(Astronomy.Body.Sun, observer, -1, Astronomy.MakeTime(new Date((APPLICATION_STATE.mapJulianDate - 2440587.5 - longitude/360) * 86400000)), 1.0);
            if (sunsetTime && sunsetTime.ut >= APPLICATION_STATE.conjunctionUniversalTime - 0.0001) {
                UI_ELEMENTS.sunsetValue.textContent = new Date((sunsetTime.ut + 2451545.0 - 2440587.5) * 86400000).toISOString().substring(11, 16);
                const moonGeocentricVector = Astronomy.GeoVector(Astronomy.Body.Moon, sunsetTime.ut, true), sunGeocentricVector = Astronomy.GeoVector(Astronomy.Body.Sun, sunsetTime.ut, true);
                const moonEcliptic = Astronomy.Ecliptic(moonGeocentricVector), sunEcliptic = Astronomy.Ecliptic(sunGeocentricVector);
                UI_ELEMENTS.elongationValue.textContent = ((moonEcliptic.elon - sunEcliptic.elon + 360) % 360).toFixed(2) + '°';
                const moonEquator = Astronomy.Equator(Astronomy.Body.Moon, sunsetTime.ut, observer, true, true);
                UI_ELEMENTS.altitudeValue.textContent = Astronomy.Horizon(sunsetTime.ut, observer, moonEquator.ra, moonEquator.dec, "normal").altitude.toFixed(2) + '°';
            } else {
                UI_ELEMENTS.sunsetValue.textContent = '--:--'; UI_ELEMENTS.altitudeValue.textContent = '0.00°'; UI_ELEMENTS.elongationValue.textContent = '0.00°';
            }
        };

        UI_ELEMENTS.languageSelector.onchange = updateLocalization; UI_ELEMENTS.hijriYearInput.value = 1447; UI_ELEMENTS.hijriMonthInput.value = 1;
        UI_ELEMENTS.previousMonthButton.onclick = () => { UI_ELEMENTS.hijriMonthInput.value--; if(UI_ELEMENTS.hijriMonthInput.value < 1){ UI_ELEMENTS.hijriMonthInput.value=12; UI_ELEMENTS.hijriYearInput.value--; } startVisibilityCalculation(); };
        UI_ELEMENTS.nextMonthButton.onclick = () => { UI_ELEMENTS.hijriMonthInput.value++; if(UI_ELEMENTS.hijriMonthInput.value > 12){ UI_ELEMENTS.hijriMonthInput.value=1; UI_ELEMENTS.hijriYearInput.value++; } startVisibilityCalculation(); };
        UI_ELEMENTS.calculateButton.onclick = startVisibilityCalculation;
        updateLocalization(); startVisibilityCalculation();
    </script>
</body>
</html>
