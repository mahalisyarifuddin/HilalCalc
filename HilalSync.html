<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>HilalSync - Hijri Simultaneity Tracker</title>
		<style>
			:root {
				--primary: #005dac;
				--on-primary: #ffffff;
				--hover: #00539a;
				--background: #f9f9ff;
				--surface: #ffffff;
				--text: #181c21;
				--border: #c1c6d4;
				--muted: #f2f3fc;
				--success: #0b6b1d;
				--on-success: #ffffff;
				--danger: #ba1a1a;
				--error: #ba1a1a;
				--on-danger: #ffffff;
				--highlight-bg: #d4e3ff;
			}

			@media (prefers-color-scheme: dark) {
				:root:not(.light) {
					--primary: #a5c8ff;
					--on-primary: #00315f;
					--hover: #72adff;
					--background: #101319;
					--surface: #0b0e14;
					--text: #e0e2ea;
					--border: #414752;
					--muted: #181c21;
					--success: #82db7e;
					--on-success: #00390a;
					--danger: #ffb4ab;
					--error: #ffb4ab;
					--on-danger: #93000a;
					--highlight-bg: #001c3a;
				}
			}

			:root.dark {
				--primary: #a5c8ff;
				--on-primary: #00315f;
				--hover: #72adff;
				--background: #101319;
				--surface: #0b0e14;
				--text: #e0e2ea;
				--border: #414752;
				--muted: #181c21;
				--success: #82db7e;
				--on-success: #00390a;
				--danger: #ffb4ab;
				--error: #ffb4ab;
				--on-danger: #93000a;
				--highlight-bg: #001c3a;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				outline-offset: 2px;
			}

			body {
				background: var(--background);
				color: var(--text);
				font-family: sans-serif;
				display: flex;
				justify-content: center;
				min-height: 100vh;
				padding: 1rem;
			}

			.container {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 8px;
				max-width: 900px;
				padding: 2rem;
				width: 100%;
				margin: 2rem 0;
				display: flex;
				flex-direction: column;
				gap: 1.5rem;
				position: relative;
			}

			.selectors {
				position: absolute;
				right: 2rem;
				top: 1rem;
				display: flex;
				gap: 8px;
			}

			.selectors select {
				width: auto;
				font-size: .9rem;
			}

			select, input, button {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 4px;
				color: var(--text);
				font-size: 1rem;
				padding: .5rem;
			}

			button {
				cursor: pointer;
			}

			.primary {
				background: var(--primary);
				color: var(--on-primary);
				border: 0;
			}

			.primary:hover {
				background: var(--hover);
			}

			.verdict-box {
				padding: 1.5rem;
				border-radius: 8px;
				text-align: center;
				font-size: 1.5rem;
				font-weight: bold;
				border: 2px solid transparent;
			}

			.verdict-simultaneous {
				background: var(--success);
				color: var(--on-success);
			}

			.verdict-divergent {
				background: var(--danger);
				color: var(--on-danger);
			}

			.panels {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 1rem;
			}

			.panel {
				border: 1px solid var(--border);
				padding: 1rem;
				border-radius: 4px;
			}

			.panel-title {
				font-weight: bold;
				margin-bottom: 0.5rem;
				border-bottom: 1px solid var(--border);
				padding-bottom: 0.25rem;
			}

			.panel-date {
				font-size: 1.2rem;
				margin-bottom: 0.5rem;
			}

			.panel-info {
				font-size: 0.9rem;
				opacity: 0.8;
				line-height: 1.4;
			}

			.controls {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				flex-wrap: wrap;
				justify-content: center;
			}

			.nav-btn {
				min-width: 80px;
			}

			.stats-box {
				background: var(--muted);
				padding: 1rem;
				border-radius: 4px;
				font-size: 0.9rem;
			}

			.stats-title {
				font-weight: bold;
				margin-bottom: 0.5rem;
			}

			@media(max-width: 600px) {
				.panels {
					grid-template-columns: 1fr;
				}

				.selectors {
					position: static;
					justify-content: flex-end;
					margin-bottom: .5rem;
				}
			}

			.hidden {
				display: none !important;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="selectors">
				<select id="language" aria-label="Language">
					<option value="en">English</option>
					<option value="id">Bahasa Indonesia</option>
				</select>
				<select id="theme" aria-label="Theme">
					<option value="auto">Auto</option>
					<option value="light">Light</option>
					<option value="dark">Dark</option>
				</select>
			</div>
			<h1 id="appTitle">HilalSync</h1>
			<div class="controls">
				<button id="prevBtn" class="nav-btn">&laquo;Prev</button>
				<input type="number" id="hYearInput" placeholder="Year" style="width: 80px;">
				<select id="hMonthInput">
					<option value="1">Muharram</option>
					<option value="2">Safar</option>
					<option value="3">Rabi' al-awwal</option>
					<option value="4">Rabi' al-thani</option>
					<option value="5">Jumada al-ula</option>
					<option value="6">Jumada al-akhira</option>
					<option value="7">Rajab</option>
					<option value="8">Sha'ban</option>
					<option value="9">Ramadan</option>
					<option value="10">Shawwal</option>
					<option value="11">Dhu al-Qi'dah</option>
					<option value="12">Dhu al-Hijjah</option>
				</select>
				<select id="dhuDayInput" class="hidden">
					<option value="0"></option>
					<option value="8"></option>
					<option value="9"></option>
				</select>
				<button id="goBtn" class="primary">Go</button>
				<button id="todayBtn">Today</button>
				<button id="nextBtn" class="nav-btn">Next &raquo;</button>
			</div>
			<div id="verdict" class="verdict-box"></div>
			<div class="panels">
				<div class="panel">
					<div class="panel-title">MABBIMS [Archipelago]</div>
					<div id="dateAceh" class="panel-date"></div>
					<div id="infoAceh" class="panel-info"></div>
				</div>
				<div class="panel">
					<div class="panel-title">GIC [Global]</div>
					<div id="dateGic" class="panel-date"></div>
					<div id="infoGic" class="panel-info"></div>
				</div>
			</div>
			<div class="stats-box">
				<div id="statsTitle" class="stats-title"></div>
				<p id="statsContent"></p>
			</div>
			<div id="methodology" class="panel-info"></div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
		<script>
			const text = {
				en: {
					appTitle: "HilalSync",
					simultaneous: "SIMULTANEOUS",
					divergent: "DIVERGENT",
					statsTitle: "Simultaneity rate (1-10,000 AH)",
					statsContent: "Overall: <b>43.16%</b>. Ritual months (Ramadan, Shawwal, Dhu al-Hijjah): <b>43.01%</b>. Validated against Wellington NZ (Fajr -18°).",
					methodology: "<b>MABBIMS</b>: Alt (Topo) ≥ 3°, Elong (Geo) ≥ 6.4° across the Malay Archipelago (95°E–141°E, 7°N–11°S). 5° grid. <b>KHGT</b>: Alt (Topo) ≥ 5°, Elong (Geo) ≥ 8° globally (lat sweep) before Fajr in Wellington NZ (-41.29°S, 174.78°E, -18°), or Americas if Conjunction < Fajr NZ. 5° grid.",
					acehInfo: "Sunset in Archipelago: ",
					gicInfo: "KHGT Deadline: ",
					alt: "Alt",
					elong: "Elong",
					today: "Today",
					dhuStart: "1st Dhu al-Hijjah",
					dhuArafat: "Day of Arafat",
					dhuEid: "Eid al-Adha",
					monthNames: ["Muharram", "Safar", "Rabi' al-awwal", "Rabi' al-thani", "Jumada al-ula", "Jumada al-akhira", "Rajab", "Sha'ban", "Ramadan", "Shawwal", "Dhu al-Qi'dah", "Dhu al-Hijjah"]
				},
				id: {
					appTitle: "HilalSync",
					simultaneous: "SEREMPAK",
					divergent: "BERBEDA",
					statsTitle: "Tingkat Keserempakan (1-10.000 H)",
					statsContent: "Total: <b>43,16%</b>. Bulan ritual (Ramadan, Syawal, Zulhijah): <b>43,01%</b>. Divalidasi terhadap Wellington NZ (Fajar -18°).",
					methodology: "<b>MABBIMS</b>: Tinggi (Topo) ≥ 3°, Elong (Geo) ≥ 6,4° di seluruh Kepulauan Melayu (95°BT–141°BT, 7°LU–11°LS). Grid 5°. <b>KHGT</b>: Tinggi (Topo) ≥ 5°, Elong (Geo) ≥ 8° secara global (sapuan lintang) sebelum Fajar di Wellington NZ (-41,29°LS, 174,78°BT, -18°), atau Amerika jika Ijtimak < Fajar NZ. Grid 5°.",
					acehInfo: "Maghrib di Kepulauan: ",
					gicInfo: "Tenggat KHGT: ",
					alt: "Tinggi",
					elong: "Elongasi",
					today: "Hari Ini",
					dhuStart: "1 Zulhijah",
					dhuArafat: "Hari Arafah",
					dhuEid: "Iduladha",
					monthNames: ["Muharram", "Safar", "Rabi'ul Awal", "Rabi'ul Akhir", "Jumadil Ula", "Jumadil Akhira", "Rajab", "Sya'ban", "Ramadan", "Syawal", "Zulkaidah", "Zulhijah"]
				}
			};

			const state = {
				lang: navigator.language?.startsWith('id') ? 'id' : 'en',
				theme: 'auto',
				year: 1447,
				month: 9,
				AE_OFFSET: 2451545.0,
				cache: {}
			};

			function loadState() {
				try {
					const s = JSON.parse(localStorage.getItem('hsState') || '{}');
					if (s.lang) state.lang = s.lang;
					if (s.theme) state.theme = s.theme;
				} catch (e) {}
			}

			function saveState() {
				localStorage.setItem('hsState', JSON.stringify({
					lang: state.lang,
					theme: state.theme
				}));
			}

			const elements = {
				language: document.getElementById('language'),
				theme: document.getElementById('theme'),
				hYearInput: document.getElementById('hYearInput'),
				hMonthInput: document.getElementById('hMonthInput'),
				dhuDayInput: document.getElementById('dhuDayInput'),
				prevBtn: document.getElementById('prevBtn'),
				nextBtn: document.getElementById('nextBtn'),
				goBtn: document.getElementById('goBtn'),
				todayBtn: document.getElementById('todayBtn'),
				verdict: document.getElementById('verdict'),
				dateAceh: document.getElementById('dateAceh'),
				infoAceh: document.getElementById('infoAceh'),
				dateGic: document.getElementById('dateGic'),
				infoGic: document.getElementById('infoGic'),
				statsContent: document.getElementById('statsContent'),
				statsTitle: document.getElementById('statsTitle'),
				methodology: document.getElementById('methodology'),
				appTitle: document.getElementById('appTitle')
			};

			function jdToDate(jd) {
				return new Date((jd - 2440587.5) * 86400000);
			}

			function utToDate(ut) {
				return jdToDate(ut + state.AE_OFFSET);
			}


			function updateLang() {
				state.lang = elements.language.value;
				saveState();
				const strings = text[state.lang];
				elements.statsTitle.textContent = strings.statsTitle;
				elements.statsContent.innerHTML = strings.statsContent;
				elements.methodology.innerHTML = strings.methodology;
				elements.appTitle.textContent = strings.appTitle;
				elements.todayBtn.textContent = strings.today;
				for (let i = 0; i < 12; i++)
					elements.hMonthInput.options[i].textContent = strings.monthNames[i];

				const dhuOptions = elements.dhuDayInput.options;
				dhuOptions[0].textContent = strings.dhuStart;
				dhuOptions[1].textContent = strings.dhuArafat;
				dhuOptions[2].textContent = strings.dhuEid;

				calculate();
			}

			function formatDate(jd) {
				const date = jdToDate(jd);
				const options = {
					weekday: 'long',
					year: 'numeric',
					month: 'long',
					day: 'numeric',
					timeZone: 'UTC'
				};
				return date.toLocaleDateString(state.lang === 'id' ? 'id-ID' : 'en-GB', options);
			}

			function updateTheme() {
				state.theme = elements.theme.value;
				saveState();
				const val = state.theme;
				document.documentElement.className = val === 'auto' ? '' : val;
			}

			function getStartJD(year, month) {
				const cacheKey = `${year}-${month}`;
				if (state.cache[cacheKey]) return state.cache[cacheKey];

				const totalMonths = (year - 1) * 12 + (month - 1);
				const approxJD = 1948439 + totalMonths * 29.53059;
				const startTime = Astronomy.MakeTime(jdToDate(approxJD - 15));
				const conj = Astronomy.SearchMoonPhase(0, startTime, 40);

				const mabbimsLons = [95, 100, 105, 110, 115, 120, 125, 130, 135, 140, 141];
				const mabbimsLats = [7, 5, 0, -5, -10, -11];
				
				let jdAceh = null;
				let detailAceh = null;
				
				const mabbimsLonsReverse = [...mabbimsLons].reverse();
				for (let day = 0; day < 3; day++) {
					let searchTime = Astronomy.MakeTime(utToDate(conj.ut + day * 1.0));
					let quickMet = false;
					const moonEq = Astronomy.Equator(Astronomy.Body.Moon, searchTime, new Astronomy.Observer(0, 95, 0), true, true);
					const sortedMabbimsLats = [...mabbimsLats].sort((a, b) => Math.abs(a - moonEq.dec) - Math.abs(b - moonEq.dec));

					for (let lat of sortedMabbimsLats) {
						const obs = new Astronomy.Observer(lat, 95, 0);
						const ss = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, -1, searchTime, 1.5);
						if (ss && ss.ut > conj.ut) {
							const mVec = Astronomy.GeoVector(Astronomy.Body.Moon, ss, true);
							const sVec = Astronomy.GeoVector(Astronomy.Body.Sun, ss, true);
							if (Astronomy.AngleBetween(mVec, sVec) >= 6.4) {
								const eqM = Astronomy.Equator(Astronomy.Body.Moon, ss, obs, true, true);
								if (Astronomy.Horizon(ss, obs, eqM.ra, eqM.dec, "normal").altitude >= 3.0) {
									quickMet = true;
									break;
								}
							}
						}
					}
					if (!quickMet) continue;

					let met = false;
					for (let lon of mabbimsLonsReverse) {
						for (let lat of sortedMabbimsLats) {
							const obs = new Astronomy.Observer(lat, lon, 0);
							const ss = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, -1, searchTime, 1.5);
							if (ss && ss.ut > conj.ut) {
								const mVec = Astronomy.GeoVector(Astronomy.Body.Moon, ss, true);
								const sVec = Astronomy.GeoVector(Astronomy.Body.Sun, ss, true);
								const e = Astronomy.AngleBetween(mVec, sVec);
								if (e >= 6.4) {
									const eqM = Astronomy.Equator(Astronomy.Body.Moon, ss, obs, true, true);
									const h = Astronomy.Horizon(ss, obs, eqM.ra, eqM.dec, "normal").altitude;
									if (h >= 3.0) {
										const jdCandidate = Math.floor(ss.ut + state.AE_OFFSET + 0.5) + 0.5;
										if (!jdAceh || jdCandidate < jdAceh) {
											jdAceh = jdCandidate;
											detailAceh = { ut: ss.ut, alt: h, elong: e };
										}
										met = true;
									}
								}
							}
							if (met) break;
						}
						if (met) break;
					}
					if (met) break;
				}

				if (!jdAceh) {
					const obsFallback = new Astronomy.Observer(5.54829, 95.32375, 0);
					const ss = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obsFallback, -1, conj, 5);
					jdAceh = Math.floor(ss.ut + state.AE_OFFSET + 0.5) + 0.5;
					detailAceh = { ut: ss.ut, alt: -1, elong: -1 };
				}

				const nzObs = new Astronomy.Observer(-41.2889, 174.7772, 0);
				const fNext = Astronomy.SearchAltitude(Astronomy.Body.Sun, nzObs, 1, conj, 1.5, -18.0);
				
				let jdGic, detailGic;

				if (!fNext) {
					const fallbackJD = Math.floor(conj.ut + state.AE_OFFSET + 0.5) + 1.5;
					jdGic = fallbackJD;
					detailGic = { ut: conj.ut, alt: -1, elong: -1 };
				} else {
					const jdSearch = Math.floor(fNext.ut + state.AE_OFFSET + 0.5);

					const checkVis = (targetJD, conjUT) => {
						const timeStartOfDay = Astronomy.MakeTime(jdToDate(targetJD - 0.5));
						const fNZ = Astronomy.SearchAltitude(Astronomy.Body.Sun, nzObs, 1, timeStartOfDay, 1.0, -18.0);
						if (!fNZ || conjUT >= fNZ.ut) return null;

						const moonEq = Astronomy.Equator(Astronomy.Body.Moon, conj, nzObs, true, true);
						const latNearMoon = Math.max(-60, Math.min(60, moonEq.dec));
						const testLats = [...new Set([0, latNearMoon, 30, -30, 60, -60])].sort((a, b) => Math.abs(a - latNearMoon) - Math.abs(b - latNearMoon));

						let quickMet = false;
						const tQuick = Astronomy.MakeTime(jdToDate(targetJD - (-180) / 360.0));
						for (const lat of testLats) {
							const obs = new Astronomy.Observer(lat, -180, 0);
							const ss = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, -1, tQuick, 1.0);
							if (ss && ss.ut > conjUT) {
								const mVec = Astronomy.GeoVector(Astronomy.Body.Moon, ss, true);
								const sVec = Astronomy.GeoVector(Astronomy.Body.Sun, ss, true);
								if (Astronomy.AngleBetween(mVec, sVec) >= 8.0) {
									const eqM = Astronomy.Equator(Astronomy.Body.Moon, ss, obs, true, true);
									if (Astronomy.Horizon(ss, obs, eqM.ra, eqM.dec, "normal").altitude >= 5.0) {
										quickMet = true;
										break;
									}
								}
							}
						}
						if (!quickMet) return null;

						for (let l = 180; l >= -180; l -= 5) {
							const tSearch = Astronomy.MakeTime(jdToDate(targetJD - l / 360.0));
							for (const lat of testLats) {
								const obs = new Astronomy.Observer(lat, l, 0);
								const ss = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, -1, tSearch, 1.0);
								if (ss && ss.ut > conjUT) {
									const mVec = Astronomy.GeoVector(Astronomy.Body.Moon, ss, true);
									const sVec = Astronomy.GeoVector(Astronomy.Body.Sun, ss, true);
									const e = Astronomy.AngleBetween(mVec, sVec);
									if (e >= 8.0) {
										const eqM = Astronomy.Equator(Astronomy.Body.Moon, ss, obs, true, true);
										const h = Astronomy.Horizon(ss, obs, eqM.ra, eqM.dec, "normal").altitude;
										if (h >= 5.0) {
											if (ss.ut <= fNZ.ut || l < -30) return { ut: ss.ut, alt: h, elong: e };
										}
									}
								}
							}
						}
						return null;
					};

					const vis = checkVis(jdSearch, conj.ut);
					jdGic = vis ? jdSearch + 0.5 : jdSearch + 1.5;
					detailGic = vis || { ut: conj.ut, alt: -1, elong: -1 };
				}

				const res = {
					jdAceh,
					jdGic,
					detailAceh,
					detailGic
				};
				state.cache[cacheKey] = res;
				return res;
			}

			function calculate() {
				state.year = parseInt(elements.hYearInput.value) || 1;
				state.month = parseInt(elements.hMonthInput.value);
				let res = getStartJD(state.year, state.month);

				const isDhu = state.month === 12;
				elements.dhuDayInput.classList.toggle('hidden', !isDhu);
				const offset = isDhu ? parseInt(elements.dhuDayInput.value) : 0;

				const strings = text[state.lang];

				elements.dateAceh.textContent = formatDate(res.jdAceh + offset);
				elements.dateGic.textContent = formatDate(res.jdGic + offset);

				const formatInfo = (info, prefix) => prefix + (info.ut > 0 ? (utToDate(info.ut).toISOString().substring(11, 19) + " UTC<br>" + strings.alt + ": " + info.alt.toFixed(2) + "°, " + strings.elong + ": " + info.elong.toFixed(2) + "°") : "N/A");

				elements.infoAceh.innerHTML = formatInfo(res.detailAceh, strings.acehInfo);
				elements.infoGic.innerHTML = formatInfo(res.detailGic, strings.gicInfo);

				const sim = Math.abs((res.jdAceh + offset) - (res.jdGic + offset)) < 0.1;
				elements.verdict.textContent = strings[sim ? 'simultaneous' : 'divergent'];
				elements.verdict.className = "verdict-box verdict-" + (sim ? "simultaneous" : "divergent");
			}

			elements.language.onchange = updateLang;
			elements.theme.onchange = updateTheme;
			elements.hMonthInput.onchange = calculate;
			elements.dhuDayInput.onchange = calculate;

			function navMonth(delta) {
				const x = state.month - 1 + delta;
				state.year += Math.floor(x / 12);
				state.month = ((x % 12) + 12) % 12 + 1;
				elements.hYearInput.value = state.year;
				elements.hMonthInput.value = state.month;
				calculate();
			}
			elements.prevBtn.onclick = () => navMonth(-1);
			elements.nextBtn.onclick = () => navMonth(1);

			elements.goBtn.onclick = calculate;

			window.addEventListener('keydown', e => {
				if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
				if (e.key === 'ArrowLeft') navMonth(-1);
				if (e.key === 'ArrowRight') navMonth(1);
			});

			function goToday(runCalc = true) {
				const now = new Date();
				const jd = now.getTime() / 86400000 + 2440587.5;
				const index = Math.round((jd - 1948439) / 29.5305743175);
				state.year = Math.floor(index / 12) + 1;
				state.month = (index % 12) + 1;
				elements.hYearInput.value = state.year;
				elements.hMonthInput.value = state.month;
				if (runCalc) calculate();
			}
			elements.todayBtn.onclick = goToday;

			goToday(false);

			loadState();
			elements.hYearInput.value = state.year;
			elements.hMonthInput.value = state.month;
			elements.language.value = state.lang;
			elements.theme.value = state.theme;
			updateLang();
			updateTheme();
		</script>
	</body>
</html>
