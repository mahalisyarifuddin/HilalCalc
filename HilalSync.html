<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HilalSync - Hijri Simultaneity Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --surface: #ffffff;
            --background: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #059669;
            --error: #dc2626;
            --muted: #64748b;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --surface: #1e293b;
                --background: #0f172a;
                --text: #f1f5f9;
                --border: #334155;
            }
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 1rem;
            line-height: 1.5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        select, button {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .month-name {
            font-weight: 700;
            font-size: 1.15rem;
        }
        .verdict {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .verdict.simultaneous { background: rgba(5, 150, 105, 0.1); color: var(--success); }
        .verdict.divergent { background: rgba(220, 38, 38, 0.1); color: var(--error); }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }
        .label { color: var(--muted); }
        .value { font-family: ui-monospace, monospace; font-weight: 500; }
        .stats {
            margin-top: 2rem;
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            text-align: center;
        }
        .progress-container {
            height: 12px;
            background: var(--border);
            border-radius: 6px;
            margin: 1.5rem 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HilalSync</h1>
            <p>Hijri Analysis: MABBIMS (Indonesia) vs Global Islamic Criteria (Turkey 2016)</p>
        </header>

        <div class="controls">
            <select id="yearSelect"></select>
            <button id="runBtn">Run Simulation</button>
        </div>

        <div id="results" class="grid"></div>

        <div id="summary" class="stats" style="display: none;">
            <div id="score" style="font-size: 1.5rem; font-weight: 700;"></div>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar" style="width: 0%"></div>
            </div>
            <div id="details" style="color: var(--muted);"></div>
        </div>
    </div>

    <script>
        const UI = new Proxy({}, { get: (t, n) => document.getElementById(n) });
        const MONTH_NAMES = ["Muharram", "Safar", "Rabi' I", "Rabi' II", "Jumada I", "Jumada II", "Rajab", "Sha'ban", "Ramadan", "Shawwal", "Dhu al-Qi'dah", "Dhu al-Hijjah"];
        const J2000 = 2451545.0;

        function populateYears() {
            for (let i = 1445; i <= 1450; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = `Hijri Year ${i}`;
                UI.yearSelect.appendChild(opt);
            }
            UI.yearSelect.value = 1447;
        }

        function getGeocentricAltitude(time, observer, moonGeo) {
            const obsVec = Astronomy.ObserverVector(time, observer, true);
            const dot = obsVec.x * moonGeo.x + obsVec.y * moonGeo.y + obsVec.z * moonGeo.z;
            const angle = Math.acos(dot / (obsVec.length * moonGeo.length));
            return 90.0 - (angle * 180.0 / Math.PI);
        }

        function getFajrWellington(jd) {
            const obs = new Astronomy.Observer(-41.2865, 174.7762, 0);
            const sr = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, Astronomy.Direction.Rise, new Astronomy.Time(jd - J2000), 1.0);
            if (!sr) return null;
            // Search for altitude -18 degrees before sunrise
            const fajrTime = Astronomy.SearchAltitude(Astronomy.Body.Sun, obs, Astronomy.Direction.Rise, new Astronomy.Time(sr.ut - 0.1), 0.2, -18.0);
            return fajrTime || new Astronomy.Time(sr.ut - (1.5 / 24.0));
        }

        function checkGIC(day29JD, conjunction) {
            const midnight = day29JD + 1.0 - J2000;
            const fajrNZ = getFajrWellington(day29JD + 1.0);
            const conjBeforeFajr = conjunction.ut < (fajrNZ ? fajrNZ.ut : -Infinity);

            // Global Grid Search
            for (let lon = 180; lon >= -180; lon -= 5) {
                const noon = new Astronomy.Time(day29JD + 0.5 - lon/360.0 - J2000);
                for (let lat = -60; lat <= 85; lat += 5) {
                    const obs = new Astronomy.Observer(lat, lon, 0);
                    const sunset = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, Astronomy.Direction.Set, noon, 1.0);
                    if (sunset && sunset.ut >= conjunction.ut) {
                        const mVec = Astronomy.GeoVector(Astronomy.Body.Moon, sunset, true);
                        const sVec = Astronomy.GeoVector(Astronomy.Body.Sun, sunset, true);
                        const alt = getGeocentricAltitude(sunset, obs, mVec);
                        const elon = Astronomy.AngleBetween(mVec, sVec);
                        if (alt >= 5.0 && elon >= 8.0) {
                            if (sunset.ut <= midnight) return true;
                            if (conjBeforeFajr && lon <= -30) return true;
                        }
                    }
                }
            }
            return false;
        }

        function checkMABBIMS(day29JD, conjunction) {
            // Indonesia grid
            for (let lon = 95; lon <= 141; lon += 1) {
                const noon = new Astronomy.Time(day29JD + 0.5 - lon/360.0 - J2000);
                for (let lat = -11; lat <= 6; lat += 1) {
                    const obs = new Astronomy.Observer(lat, lon, 0);
                    const sunset = Astronomy.SearchRiseSet(astronomy.Body.Sun, obs, astronomy.Direction.Set, noon, 1.0);
                    if (sunset && sunset.ut >= conjunction.ut) {
                        const topo = Astronomy.Horizon(sunset, obs, Astronomy.Body.Moon, null, null);
                        const mVec = Astronomy.GeoVector(Astronomy.Body.Moon, sunset, true);
                        const sVec = Astronomy.GeoVector(Astronomy.Body.Sun, sunset, true);
                        const elon = Astronomy.AngleBetween(mVec, sVec);
                        if (topo.altitude >= 3.0 && elon >= 6.4) return true;
                    }
                }
            }
            return false;
        }

        async function simulate() {
            UI.results.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--muted); font-weight: 500;">Performing global alignment analysis...</div>';
            UI.summary.style.display = 'none';
            await new Promise(r => setTimeout(r, 50));

            const startJDs = { 1445: 2460144.5, 1446: 2460498.5, 1447: 2460852.5, 1448: 2461206.5, 1449: 2461560.5, 1450: 2461915.5 };
            let currentJD = startJDs[UI.yearSelect.value];
            let matches = 0;
            UI.results.innerHTML = '';

            for (let i = 0; i < 12; i++) {
                const conj = Astronomy.SearchMoonPhase(0, new Astronomy.Time(currentJD - J2000 + 15), 40);
                const d29 = currentJD + 28;
                const gic = checkGIC(d29, conj);
                const mab = checkMABBIMS(d29, conj);
                const gicJD = d29 + (gic ? 1.0 : 2.0);
                const mabJD = d29 + (mab ? 1.0 : 2.0);
                const isSame = gicJD === mabJD;
                if (isSame) matches++;

                const fmt = (jd) => new Date((jd - 2440587.5) * 86400000).toISOString().split('T')[0];
                const data = { name: MONTH_NAMES[i], gic: fmt(gicJD), mab: fmt(mabJD), same: isSame };

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="month-header"><span class="month-name">${data.name}</span><span class="verdict ${data.same ? 'simultaneous' : 'divergent'}">${data.same ? 'Simultaneous' : 'Divergent'}</span></div>
                    <div class="data-row"><span class="label">MABBIMS (Indonesia)</span><span class="value">${data.mab}</span></div>
                    <div class="data-row"><span class="label">GIC (Global Turkey)</span><span class="value">${data.gic}</span></div>`;
                UI.results.appendChild(card);
                currentJD = mabJD;
            }

            UI.summary.style.display = 'block';
            const pct = (matches / 12 * 100).toFixed(1);
            UI.score.textContent = `Agreement: ${pct}%`;
            UI.progressBar.style.width = `${pct}%`;
            UI.details.textContent = `The criteria matched for ${matches} out of 12 months in Hijri ${UI.yearSelect.value}.`;
        }

        UI.runBtn.addEventListener('click', simulate);
        window.addEventListener('DOMContentLoaded', populateYears);
    </script>
</body>
</html>
