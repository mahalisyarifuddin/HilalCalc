<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>HilalSync - Hijri Simultaneity Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        :root {
            --primary: #2563eb; --on-primary: #ffffff; --hover: #1d4ed8; --background: #f8fafc; --surface: #ffffff; --text: #1e293b; --border: #e2e8f0; --muted: #f1f5f9; --success: #059669; --on-success: #ffffff; --danger: #dc2626; --error: #dc2626; --on-danger: #ffffff; --highlight-bg: #dbeafe;
        }
        @media (prefers-color-scheme: dark) {
            :root:not(.light) {
                --primary: #60a5fa; --on-primary: #0f172a; --hover: #93c5fd; --background: #0f172a; --surface: #1e293b; --text: #f1f5f9; --border: #334155; --muted: #334155; --success: #34d399; --on-success: #064e3b; --danger: #f87171; --error: #f87171; --on-danger: #7f1d1d; --highlight-bg: #1e3a8a;
            }
        }
        :root.dark {
            --primary: #60a5fa; --on-primary: #0f172a; --hover: #93c5fd; --background: #0f172a; --surface: #1e293b; --text: #f1f5f9; --border: #334155; --muted: #334155; --success: #34d399; --on-success: #064e3b; --danger: #f87171; --error: #f87171; --on-danger: #7f1d1d; --highlight-bg: #1e3a8a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline-offset: 2px; }
        body { background: var(--background); color: var(--text); font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; min-height: 100vh; padding: 1rem; }
        .container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 900px; padding: 2rem; width: 100%; margin: 2rem 0; display: flex; flex-direction: column; gap: 1.5rem; position: relative; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .selectors { position: absolute; right: 2rem; top: 1rem; display: flex; gap: 8px; }
        .selectors select { width: auto; font-size: .85rem; border-radius: 6px; }
        select, input, button { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; padding: .6rem; }
        button { cursor: pointer; font-weight: 600; transition: all 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .primary { background: var(--primary); color: var(--on-primary); border: 0; }
        .primary:hover:not(:disabled) { background: var(--hover); }
        .verdict-box { padding: 1.5rem; border-radius: 12px; text-align: center; font-size: 1.75rem; font-weight: 800; letter-spacing: 0.05em; border: 2px solid transparent; min-height: 4rem; }
        .verdict-simultaneous { background: var(--success); color: var(--on-success); }
        .verdict-divergent { background: var(--danger); color: var(--on-danger); }
        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .panel { border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; background: var(--background); }
        .panel-title { font-weight: 700; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; color: var(--primary); font-size: 1.1rem; }
        .panel-date { font-size: 1.3rem; margin-bottom: 1rem; font-weight: 700; min-height: 1.5em; }
        .panel-info { font-size: 0.95rem; opacity: 0.9; line-height: 1.6; }
        .controls { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
        .nav-btn { min-width: 90px; }
        .stats-box { background: var(--muted); padding: 1.5rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .stats-title { font-weight: 700; margin-bottom: 0.5rem; font-size: 1.1rem; }
        @media(max-width: 650px) { .panels { grid-template-columns: 1fr; } .selectors { position: static; justify-content: flex-end; margin-bottom: .5rem; } }
        .spinner { display: inline-block; width: 1.2rem; height: 1.2rem; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="selectors">
            <select id="languageSelector" aria-label="Language"><option value="en">English</option><option value="id">Bahasa Indonesia</option></select>
            <select id="themeSelector" aria-label="Theme"><option value="auto">Auto</option><option value="light">Light</option><option value="dark">Dark</option></select>
        </div>
        <h1 id="applicationTitle">HilalSync</h1>
        <div class="controls">
            <button id="previousMonthButton" class="nav-btn">&laquo; Prev</button>
            <input type="number" id="hijriYearInput" placeholder="Year" style="width: 100px;">
            <select id="hijriMonthInput">
                <option value="1">Muharram</option><option value="2">Safar</option><option value="3">Rabi' al-awwal</option><option value="4">Rabi' al-thani</option><option value="5">Jumada al-ula</option><option value="6">Jumada al-akhira</option><option value="7">Rajab</option><option value="8">Sha'ban</option><option value="9">Ramadan</option><option value="10">Shawwal</option><option value="11">Dhu al-Qi'dah</option><option value="12">Dhu al-Hijjah</option>
            </select>
            <button id="analyzeButton" class="primary">Analyze</button>
            <button id="todayButton">Today</button>
            <button id="nextMonthButton" class="nav-btn">Next &raquo;</button>
        </div>
        <div id="verdictDisplay" class="verdict-box"></div>
        <div class="panels">
            <div class="panel">
                <div class="panel-title" id="mabbimsPanelTitle">MABBIMS [Indonesia]</div>
                <div id="dateMabbimsDisplay" class="panel-date"></div>
                <div id="infoMabbimsDisplay" class="panel-info"></div>
            </div>
            <div class="panel">
                <div class="panel-title" id="gicPanelTitle">GIC [Global]</div>
                <div id="dateGicDisplay" class="panel-date"></div>
                <div id="infoGicDisplay" class="panel-info"></div>
            </div>
        </div>
        <div class="stats-box">
            <div id="statsTitleLabel" style="font-weight:700;margin-bottom:0.5rem"></div>
            <p id="statsContentDisplay"></p>
        </div>
        <div id="methodologyDescription" class="panel-info" style="padding: 0 1rem; border-left: 4px solid var(--primary);"></div>
    </div>
    <script>
        const TRANSLATIONS = {
            en: {
                applicationTitle: "HilalSync", simultaneous: "SIMULTANEOUS", divergent: "DIVERGENT", statsTitle: "Simultaneity rate (1-10,000 AH)",
                statsContent: "Overall: <b>62.74%</b>. Ritual months: <b>62.67%</b>. Validated 100% against T. Djamaluddin's 1447 dataset.",
                methodology: "<b>MABBIMS</b>: Alt ≥ 3°, Elong (Ecliptic) ≥ 6.4° in Indonesia. <b>GIC</b>: Alt (Geo) ≥ 5°, Elong (Ecliptic) ≥ 8° globally.",
                mabbimsInfo: "Match in Indonesia: ", gicInfo: "GIC Match: ", altitude: "Alt", elongation: "Elong", today: "Today", mabbimsTitle: "MABBIMS [Indonesia]", gicTitle: "GIC [Global]",
                monthNames: ["Muharram", "Safar", "Rabi' al-awwal", "Rabi' al-thani", "Jumada al-ula", "Jumada al-akhira", "Rajab", "Sha'ban", "Ramadan", "Shawwal", "Dhu al-Qi'dah", "Dhu al-Hijjah"],
                analyzing: "Analyzing...", analyze: "Analyze"
            },
            id: {
                applicationTitle: "HilalSync", simultaneous: "SEREMPAK", divergent: "BERBEDA", statsTitle: "Tingkat Keserempakan (1-10.000 H)",
                statsContent: "Total: <b>62,74%</b>. Bulan ritual: <b>62,67%</b>. Validasi dataset 1447 T. Djamaluddin.",
                methodology: "<b>MABBIMS</b>: Tinggi ≥ 3°, Elongasi (Ecliptic) ≥ 6,4° di Indonesia. <b>GIC</b>: Tinggi (Geo) ≥ 5°, Elongasi (Ecliptic) ≥ 8° global.",
                mabbimsInfo: "Kriteria di Indonesia: ", gicInfo: "Kriteria GIC: ", altitude: "Tinggi", elongation: "Elongasi", today: "Hari Ini", mabbimsTitle: "MABBIMS [Indonesia]", gicTitle: "GIC [Global]",
                monthNames: ["Muharram", "Safar", "Rabi'ul Awal", "Rabi'ul Akhir", "Jumadil Ula", "Jumadil Akhira", "Rajab", "Sya'ban", "Ramadan", "Syawal", "Zulkaidah", "Zulhijah"],
                analyzing: "Menganalisis...", analyze: "Analisis"
            }
        };

        const WORKER_CODE = `
            importScripts("https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js");

            function getEclipticElongation(universalTime) {
                const moonGeocentricVector = Astronomy.GeoVector(Astronomy.Body.Moon, universalTime, true);
                const sunGeocentricVector = Astronomy.GeoVector(Astronomy.Body.Sun, universalTime, true);
                const moonEcliptic = Astronomy.Ecliptic(moonGeocentricVector);
                const sunEcliptic = Astronomy.Ecliptic(sunGeocentricVector);
                return (moonEcliptic.elon - sunEcliptic.elon + 360) % 360;
            }

            function calculateGeocentricAltitude(universalTime, observer, moonGeocentricVector) {
                const observerVector = Astronomy.ObserverVector(universalTime, observer, true);
                const dotProduct = observerVector.x * moonGeocentricVector.x + observerVector.y * moonGeocentricVector.y + observerVector.z * moonGeocentricVector.z;
                const observerMagnitude = Math.sqrt(observerVector.x**2 + observerVector.y**2 + observerVector.z**2);
                const moonMagnitude = Math.sqrt(moonGeocentricVector.x**2 + moonGeocentricVector.y**2 + moonGeocentricVector.z**2);
                return 90.0 - Math.acos(Math.max(-1, Math.min(1, dotProduct / (observerMagnitude * moonMagnitude)))) * 180.0 / Math.PI;
            }

            function checkMABBIMS(searchDayJulianDate, conjunctionUniversalTime) {
                for (let longitude = 141; longitude >= 95; longitude -= 2) {
                    for (let latitude = -11; latitude <= 7; latitude += 2) {
                        const observer = new Astronomy.Observer(latitude, longitude, 0);
                        const sunsetTime = Astronomy.SearchRiseSet(Astronomy.Body.Sun, observer, -1, Astronomy.MakeTime(new Date((searchDayJulianDate - 2440587.5 - longitude/360) * 86400000)), 1.0);
                        if (sunsetTime && sunsetTime.ut >= conjunctionUniversalTime - 0.0001) {
                            const eclipticElongation = getEclipticElongation(sunsetTime.ut);
                            const moonEquator = Astronomy.Equator(Astronomy.Body.Moon, sunsetTime.ut, observer, true, true);
                            const topocentricAltitude = Astronomy.Horizon(sunsetTime.ut, observer, moonEquator.ra, moonEquator.dec, "normal").altitude;
                            if (topocentricAltitude >= 3.0 && eclipticElongation >= 6.4) return { universalTime: sunsetTime.ut, altitude: topocentricAltitude, elongation: eclipticElongation };
                        }
                    }
                }
                return null;
            }

            function checkGIC(searchDayJulianDate, conjunctionUniversalTime, nextFajrNewZealand, offset) {
                const midnightUniversalTime = searchDayJulianDate + 1.0 - offset;
                for (let longitude = 180; longitude >= -180; longitude -= 4) {
                    for (let latitude = -60; latitude <= 60; latitude += 4) {
                        const observer = new Astronomy.Observer(latitude, longitude, 0);
                        const sunsetTime = Astronomy.SearchRiseSet(Astronomy.Body.Sun, observer, -1, Astronomy.MakeTime(new Date((searchDayJulianDate - 2440587.5 - longitude/360) * 86400000)), 1.0);
                        if (sunsetTime && sunsetTime.ut >= conjunctionUniversalTime - 0.0001) {
                            const eclipticElongation = getEclipticElongation(sunsetTime.ut);
                            const geocentricAltitude = calculateGeocentricAltitude(sunsetTime.ut, observer, Astronomy.GeoVector(Astronomy.Body.Moon, sunsetTime.ut, true));
                            if (geocentricAltitude >= 5.0 && eclipticElongation >= 8.0) {
                                let isValid = sunsetTime.ut <= midnightUniversalTime + 0.0001;
                                if (!isValid && longitude <= -30 && sunsetTime.ut < nextFajrNewZealand.ut) isValid = true;
                                if (isValid) return { universalTime: sunsetTime.ut, altitude: geocentricAltitude, elongation: eclipticElongation };
                            }
                        }
                    }
                }
                return null;
            }

            function findMonthStart(targetYear, targetMonth, offset) {
                const observerNewZealand = new Astronomy.Observer(-41.28, 174.77, 0);
                let currentMabbimsJulianDate = 2460144.5, currentGicJulianDate = 2460144.5;
                let monthIndex = (1445 - 1) * 12;
                const targetIndex = (targetYear - 1) * 12 + (targetMonth - 1);

                if (targetIndex < monthIndex) {
                    currentMabbimsJulianDate = currentGicJulianDate = 1948439.5;
                    monthIndex = 0;
                }

                let detailsMabbims = null, detailsGic = null;

                while (monthIndex < targetIndex) {
                    const conjunctionSearchTime = Astronomy.MakeTime(new Date((currentMabbimsJulianDate - 2440587.5 + 20) * 86400000));
                    const conjunction = Astronomy.SearchMoonPhase(0, conjunctionSearchTime, 40);

                    let day29Mabbims = currentMabbimsJulianDate + 28;
                    const fajrNewZealandMabbims = Astronomy.SearchAltitude(Astronomy.Body.Sun, observerNewZealand, 1, Astronomy.MakeTime(new Date((day29Mabbims - 2440587.5 - 0.5) * 86400000)), 2.0, -18.0);
                    if (conjunction.ut > fajrNewZealandMabbims.ut - 0.0001) {
                        currentMabbimsJulianDate = day29Mabbims + 2; detailsMabbims = null;
                    } else {
                        const result = checkMABBIMS(day29Mabbims, conjunction.ut);
                        if (result) { currentMabbimsJulianDate = day29Mabbims + 1; detailsMabbims = result; }
                        else { currentMabbimsJulianDate = day29Mabbims + 2; detailsMabbims = null; }
                    }

                    let day29Gic = currentGicJulianDate + 28;
                    const fajrNewZealandGic = Astronomy.SearchAltitude(Astronomy.Body.Sun, observerNewZealand, 1, Astronomy.MakeTime(new Date((day29Gic - 2440587.5 - 0.5) * 86400000)), 2.0, -18.0);
                    const nextFajrNewZealandGic = Astronomy.SearchAltitude(Astronomy.Body.Sun, observerNewZealand, 1, Astronomy.MakeTime(new Date((day29Gic - 2440587.5 + 0.5) * 86400000)), 2.0, -18.0);
                    if (conjunction.ut > fajrNewZealandGic.ut - 0.0001) {
                        currentGicJulianDate = day29Gic + 2; detailsGic = null;
                    } else {
                        const result = checkGIC(day29Gic, conjunction.ut, nextFajrNewZealandGic, offset);
                        if (result) { currentGicJulianDate = day29Gic + 1; detailsGic = result; }
                        else { currentGicJulianDate = day29Gic + 2; detailsGic = null; }
                    }
                    monthIndex++;
                }

                const finalConjunctionSearchTime = Astronomy.MakeTime(new Date((currentMabbimsJulianDate - 2440587.5 - 10) * 86400000));
                const finalConjunction = Astronomy.SearchMoonPhase(0, finalConjunctionSearchTime, 40);
                if (!detailsMabbims) detailsMabbims = checkMABBIMS(currentMabbimsJulianDate - 1, finalConjunction.ut);
                const nextFajrNewZealandGic = Astronomy.SearchAltitude(Astronomy.Body.Sun, observerNewZealand, 1, Astronomy.MakeTime(new Date((currentGicJulianDate - 2440587.5 - 0.5) * 86400000)), 2.0, -18.0);
                if (!detailsGic) detailsGic = checkGIC(currentGicJulianDate - 1, finalConjunction.ut, nextFajrNewZealandGic, offset);

                return { julianDateMabbims: currentMabbimsJulianDate, julianDateGic: currentGicJulianDate, detailsMabbims, detailsGic };
            }

            self.onmessage = function(event) {
                const { year, month, offset } = event.data;
                const result = findMonthStart(year, month, offset);
                self.postMessage(result);
            };
        `;

        const APPLICATION_STATE = { currentLanguage: "en", hijriYear: 1447, hijriMonth: 1, OFFSET: 2451545.0 };
        const UI_ELEMENTS = {
            lang: document.getElementById('languageSelector'), theme: document.getElementById('themeSelector'), year: document.getElementById('hijriYearInput'), month: document.getElementById('hijriMonthInput'),
            prev: document.getElementById('previousMonthButton'), next: document.getElementById('nextMonthButton'), go: document.getElementById('analyzeButton'), today: document.getElementById('todayButton'),
            verdict: document.getElementById('verdictDisplay'), dateMab: document.getElementById('dateMabbimsDisplay'), infoMab: document.getElementById('infoMabbimsDisplay'),
            dateGic: document.getElementById('dateGicDisplay'), infoGic: document.getElementById('infoGicDisplay'), stats: document.getElementById('statsContentDisplay'),
            stTitle: document.getElementById('statsTitleLabel'), meth: document.getElementById('methodologyDescription'), appTitle: document.getElementById('applicationTitle'),
            mabTitle: document.getElementById('mabbimsPanelTitle'), gicTitle: document.getElementById('gicPanelTitle')
        };

        let worker = null;

        function updateLang() {
            APPLICATION_STATE.currentLanguage = UI_ELEMENTS.lang.value; const tr = TRANSLATIONS[APPLICATION_STATE.currentLanguage];
            UI_ELEMENTS.stTitle.textContent = tr.statsTitle; UI_ELEMENTS.stats.innerHTML = tr.statsContent; UI_ELEMENTS.meth.innerHTML = tr.methodology; UI_ELEMENTS.appTitle.textContent = tr.applicationTitle;
            UI_ELEMENTS.today.textContent = tr.today; UI_ELEMENTS.mabTitle.textContent = tr.mabbimsTitle; UI_ELEMENTS.gicTitle.textContent = tr.gicTitle;
            for (let i = 0; i < 12; i++) UI_ELEMENTS.month.options[i].textContent = tr.monthNames[i];
            performAnalysis();
        }

        function formatDisplayDate(julianDate) {
            const date = new Date((julianDate - 2440587.5 + 0.5) * 86400000);
            const locale = APPLICATION_STATE.currentLanguage === 'id' ? 'id-ID' : 'en-GB';
            return date.toLocaleDateString(locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
        }

        function performAnalysis() {
            APPLICATION_STATE.hijriYear = parseInt(UI_ELEMENTS.year.value) || 1;
            APPLICATION_STATE.hijriMonth = parseInt(UI_ELEMENTS.month.value);
            const tr = TRANSLATIONS[APPLICATION_STATE.currentLanguage];

            UI_ELEMENTS.go.disabled = true;
            UI_ELEMENTS.go.innerHTML = `<span class="spinner"></span> \${tr.analyzing}`;

            if (worker) worker.terminate();
            const blob = new Blob([WORKER_CODE], { type: "application/javascript" });
            worker = new Worker(URL.createObjectURL(blob));

            worker.onmessage = function(e) {
                const { julianDateMabbims, julianDateGic, detailsMabbims, detailsGic } = e.data;
                UI_ELEMENTS.dateMab.textContent = formatDisplayDate(julianDateMabbims);
                UI_ELEMENTS.dateGic.textContent = formatDisplayDate(julianDateGic);

                const fmtI = (d, p) => p + (d && d.altitude > -180 ? (new Date((d.universalTime + APPLICATION_STATE.OFFSET - 2440587.5) * 86400000).toISOString().substring(11, 19) + " UTC<br>" + tr.altitude + ": " + d.altitude.toFixed(2) + "°, " + tr.elongation + ": " + d.elongation.toFixed(2) + "°") : "N/A");
                UI_ELEMENTS.infoMab.innerHTML = fmtI(detailsMabbims, tr.mabbimsInfo);
                UI_ELEMENTS.infoGic.innerHTML = fmtI(detailsGic, tr.gicInfo);

                const sim = Math.abs(julianDateMabbims - julianDateGic) < 0.1;
                UI_ELEMENTS.verdict.textContent = tr[sim ? 'simultaneous' : 'divergent'];
                UI_ELEMENTS.verdict.className = "verdict-box verdict-" + (sim ? "simultaneous" : "divergent");

                UI_ELEMENTS.go.disabled = false;
                UI_ELEMENTS.go.textContent = tr.analyze;
            };

            worker.postMessage({ year: APPLICATION_STATE.hijriYear, month: APPLICATION_STATE.hijriMonth, offset: APPLICATION_STATE.OFFSET });
        }

        UI_ELEMENTS.lang.onchange = updateLang;
        document.getElementById('themeSelector').onchange = function() { const v = this.value; document.documentElement.className = v === 'auto' ? '' : v; };
        UI_ELEMENTS.prev.onclick = () => { UI_ELEMENTS.month.value--; if (UI_ELEMENTS.month.value < 1) { UI_ELEMENTS.month.value = 12; UI_ELEMENTS.year.value--; } performAnalysis(); };
        UI_ELEMENTS.next.onclick = () => { UI_ELEMENTS.month.value++; if (UI_ELEMENTS.month.value > 12) { UI_ELEMENTS.month.value = 1; UI_ELEMENTS.year.value++; } performAnalysis(); };
        UI_ELEMENTS.go.onclick = performAnalysis;
        UI_ELEMENTS.today.onclick = () => {
            const i = Math.floor((Date.now() / 86400000 + 2440587.5 - 1948440 - 0.236624) / 29.530573265);
            UI_ELEMENTS.year.value = Math.floor(i / 12) + 1; UI_ELEMENTS.month.value = (i % 12) + 1;
            performAnalysis();
        };

        UI_ELEMENTS.year.value = APPLICATION_STATE.hijriYear; UI_ELEMENTS.month.value = APPLICATION_STATE.hijriMonth;
        updateLang();
    </script>
</body>
</html>
